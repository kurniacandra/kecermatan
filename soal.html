<!DOCTYPE html>
<html lang="id">
<head>
    <script>
        if (sessionStorage.getItem("statusLogin") !== "aktif") {
            alert("Akses ditolak! Silakan login terlebih dahulu.");
            window.location.href = "index.html";
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulasi Kecermatan - KurniaCandra</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #f39c12; --success: #27ae60; --danger: #e74c3c; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--light); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; width: 100%; max-width: 850px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; }
        .header { background: var(--primary); color: white; padding: 15px; text-align: center; border-bottom: 4px solid var(--accent); }
        .header h1 { margin: 0; font-size: 1.4rem; }
        .screen { display: none; padding: 25px; text-align: center; flex-grow: 1; }
        .active { display: block; }
        .setup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .input-group { display: flex; align-items: center; background: #fff; padding: 8px; border-radius: 5px; border: 1px solid #ccc; }
        .input-group label { width: 70px; font-weight: bold; font-size: 0.85rem; color: #555; }
        input[type="text"] { flex: 1; padding: 8px; border: none; outline: none; text-align: center; font-weight: bold; text-transform: uppercase; }
        .stats-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: #f9f9f9; padding: 12px; border-radius: 8px; border: 1px solid #eee; }
        .timer-box { font-size: 2.2rem; font-weight: 800; color: var(--danger); }
        .key-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 20px; }
        .key-box { border: 2px solid #333; border-radius: 6px; overflow: hidden; }
        .key-head { background: #333; color: white; padding: 4px; font-weight: bold; }
        .key-val { font-size: 1.8rem; padding: 12px; font-weight: bold; background: #fff; }
        #question { font-size: 4.5rem; font-weight: 900; letter-spacing: 25px; margin: 45px 0; color: #000; user-select: none; }
        .ans-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
        .btn-ans { padding: 18px; font-size: 1.6rem; border: none; background: var(--primary); color: white; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        .total-score-box { background: var(--primary); color: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .total-score-box h2 { margin: 0; font-size: 0.9rem; opacity: 0.9; text-transform: uppercase; }
        .total-score-box div { font-size: 2.5rem; font-weight: 900; color: var(--accent); }

        .aspek-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin: 20px 0; }
        .aspek-card { background: #f8f9fa; padding: 15px; border-radius: 8px; border-bottom: 4px solid var(--primary); text-align: left; }
        .aspek-card h4 { margin: 0; font-size: 0.8rem; color: #666; text-transform: uppercase; }
        .aspek-card div { font-size: 1.5rem; font-weight: bold; color: var(--primary); margin: 5px 0; }
        .kat-text { font-size: 0.75rem; font-weight: bold; text-transform: uppercase; padding: 2px 6px; border-radius: 3px; color: white; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background: #f2f2f2; }
        .credit-footer { background: #f9f9f9; color: #666; padding: 15px; text-align: center; font-size: 0.85rem; border-top: 1px solid #eee; }
        .ig-link { color: var(--primary); font-weight: bold; text-decoration: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h1>TES KECERMATAN POLRI - SIMULASI CAT</h1></div>

    <div id="screen-setup" class="screen active">
        <h3>Input Karakter 10 Kolom</h3>
        <div class="setup-grid" id="input-fields"></div>
        <button class="btn-ans" style="background: var(--success); width: 250px; font-size: 1.1rem;" onclick="validateAndStart()">START SIMULASI</button>
    </div>

    <div id="screen-game" class="screen">
        <div class="stats-top">
            <div style="text-align: left;"><span id="col-info" style="font-weight: bold; font-size: 1.2rem;">KOLOM 1</span></div>
            <div class="timer-box" id="timer">60</div>
            <div>B: <span id="live-b" style="color:var(--success); font-weight:bold;">0</span> | S: <span id="live-s" style="color:var(--danger); font-weight:bold;">0</span></div>
        </div>
        <div class="key-row">
            <div class="key-box"><div class="key-head">A</div><div class="key-val" id="v0"></div></div>
            <div class="key-box"><div class="key-head">B</div><div class="key-val" id="v1"></div></div>
            <div class="key-box"><div class="key-head">C</div><div class="key-val" id="v2"></div></div>
            <div class="key-box"><div class="key-head">D</div><div class="key-val" id="v3"></div></div>
            <div class="key-box"><div class="key-head">E</div><div class="key-val" id="v4"></div></div>
        </div>
        <div id="question">----</div>
        <div class="ans-grid">
            <button class="btn-ans" onclick="hit(0)">A</button>
            <button class="btn-ans" onclick="hit(1)">B</button>
            <button class="btn-ans" onclick="hit(2)">C</button>
            <button class="btn-ans" onclick="hit(3)">D</button>
            <button class="btn-ans" onclick="hit(4)">E</button>
        </div>
    </div>

    <div id="screen-result" class="screen">
        <div class="total-score-box">
            <h2>Nilai Akhir Kecermatan</h2>
            <div id="res-total">0</div>
        </div>
        <div class="aspek-container">
            <div class="aspek-card"><h4>Kecepatan Kerja</h4><div id="res-panker">0</div><span id="kat-panker"></span></div>
            <div class="aspek-card"><h4>Ketelitian Kerja</h4><div id="res-tianker">0</div><span id="kat-tianker"></span></div>
            <div class="aspek-card"><h4>Keajegan Kerja</h4><div id="res-janker">0</div><span id="kat-janker"></span></div>
            <div class="aspek-card"><h4>Ketahanan Kerja</h4><div id="res-hanker">0</div><span id="kat-hanker"></span></div>
        </div>
        <div id="final-table"></div>
        <div style="height: 300px; margin-top: 20px;"><canvas id="myChart"></canvas></div>
        <button class="btn-ans" style="background:var(--success); margin-top:20px; font-size:1.1rem;" onclick="resetTest()">ULANGI TES</button>
    </div>

    <div class="credit-footer">
        Aplikasi Simulasi &copy; 2026 | 
        <a href="https://www.instagram.com/kurniacandraa_/" target="_blank" class="ig-link">Credit by KurniaCandra</a>
    </div>
</div>

<script>
    const TOTAL_COL = 10, TIME_LIMIT = 60; 
    let allColumnKeys = [], currentColumn = 0, scoreCorrect = 0, scoreWrong = 0, statsData = [], timerId, currentCorrectIdx = -1, myChart;

    const examples = ["ABCDE", "12345", "QWERT", "@#$%&", "ASDFG", "67890", "ZXCVB", "!*()+", "MNBVC", "YUIOP"];
    const inputArea = document.getElementById('input-fields');
    for(let i=0; i < TOTAL_COL; i++) {
        inputArea.innerHTML += `<div class="input-group"><label>K-${i+1}</label><input type="text" id="input-${i}" maxlength="5" placeholder="${examples[i]}"></div>`;
    }

    function getKategori(nilai, tipe) {
        const ranges = { panker:[25,35,45,55], tianker:[75,85,92,97], janker:[40,60,80,90], hanker:[40,60,80,90] };
        const r = ranges[tipe];
        let label = "", color = "";
        if (nilai >= r[3]) { label="Sangat Tinggi"; color="#1b5e20"; }
        else if (nilai >= r[2]) { label="Tinggi"; color="#2e7d32"; }
        else if (nilai >= r[1]) { label="Cukup"; color="#f9a825"; }
        else if (nilai >= r[0]) { label="Rendah"; color="#d32f2f"; }
        else { label="Sangat Rendah"; color="#b71c1c"; }
        return `<span class="kat-text" style="background:${color}">${label}</span>`;
    }

    function validateAndStart() {
        allColumnKeys = [];
        for(let i=0; i < TOTAL_COL; i++) {
            let inputEl = document.getElementById(`input-${i}`);
            let val = inputEl.value.replace(/\s/g, '').toUpperCase() || inputEl.getAttribute('placeholder');
            if(val.length !== 5) return alert(`Lengkapi Kolom ${i+1}!`);
            if(new Set(val).size !== 5) return alert(`Kolom ${i+1} tidak boleh ada huruf/angka yang sama!`);
            allColumnKeys.push(val.split(''));
        }
        showScreen('screen-game');
        runColumn();
    }

    function runColumn() {
        scoreCorrect = 0; scoreWrong = 0;
        document.getElementById('live-b').innerText = 0; 
        document.getElementById('live-s').innerText = 0;
        document.getElementById('col-info').innerText = `KOLOM ${currentColumn + 1}`;
        let keys = allColumnKeys[currentColumn];
        for(let i=0; i<5; i++) document.getElementById('v'+i).innerText = keys[i];
        newQuestion(); startTimer();
    }

    function newQuestion() {
        currentCorrectIdx = Math.floor(Math.random() * 5);
        let keys = allColumnKeys[currentColumn];
        let q = keys.filter((_, idx) => idx !== currentCorrectIdx).sort(() => 0.5 - Math.random());
        document.getElementById('question').innerText = q.join('');
    }

    function hit(idx) {
        if(idx === currentCorrectIdx) scoreCorrect++; else scoreWrong++;
        document.getElementById('live-b').innerText = scoreCorrect;
        document.getElementById('live-s').innerText = scoreWrong;
        newQuestion();
    }

    function startTimer() {
        let left = TIME_LIMIT;
        document.getElementById('timer').innerText = left;
        clearInterval(timerId);
        timerId = setInterval(() => {
            left--; document.getElementById('timer').innerText = left;
            if(left <= 0) {
                clearInterval(timerId);
                statsData.push({ col: currentColumn+1, b: scoreCorrect, s: scoreWrong, total: scoreCorrect + scoreWrong });
                currentColumn++;
                if(currentColumn < TOTAL_COL) { 
                    alert("Kolom " + currentColumn + " Selesai! Klik OK untuk lanjut.");
                    runColumn(); 
                } else { 
                    alert("Tes Selesai!");
                    finish(); 
                }
            }
        }, 1000);
    }

    function finish() {
        showScreen('screen-result');
        const bList = statsData.map(d => d.b);
        const totalB = bList.reduce((a, b) => a + b, 0);
        const totalT = statsData.reduce((a, b) => a + b.total, 0);

        let panker = totalT / TOTAL_COL;
        let tianker = totalT > 0 ? (totalB / totalT) * 100 : 0;
        let deviasi = Math.max(...bList) - Math.min(...bList);
        let janker = Math.max(0, 100 - (deviasi * 4));
        let hanker = (bList[7] + bList[8] + bList[9]) / 3 * 2;

        let nAkustik = (Math.min(panker*1.8, 100) * 0.3) + (tianker * 0.4) + (janker * 0.15) + (Math.min(hanker*1.8, 100) * 0.15);

        document.getElementById('res-total').innerText = nAkustik.toFixed(1);
        document.getElementById('res-panker').innerText = panker.toFixed(1);
        document.getElementById('kat-panker').innerHTML = getKategori(panker, 'panker');
        document.getElementById('res-tianker').innerText = tianker.toFixed(1) + "%";
        document.getElementById('kat-tianker').innerHTML = getKategori(tianker, 'tianker');
        document.getElementById('res-janker').innerText = janker.toFixed(0);
        document.getElementById('kat-janker').innerHTML = getKategori(janker, 'janker');
        document.getElementById('res-hanker').innerText = hanker.toFixed(0);
        document.getElementById('kat-hanker').innerHTML = getKategori(hanker, 'hanker');

        let html = `<table><tr><th>Kolom</th><th>Benar</th><th>Salah</th><th>Total</th></tr>`;
        statsData.forEach(d => { html += `<tr><td>${d.col}</td><td>${d.b}</td><td>${d.s}</td><td>${d.total}</td></tr>`; });
        document.getElementById('final-table').innerHTML = html + `</table>`;

        if (myChart) myChart.destroy();
        myChart = new Chart(document.getElementById('myChart'), {
            type: 'bar',
            data: {
                labels: statsData.map(d => "K" + d.col),
                datasets: [{ label: 'Benar', data: bList, backgroundColor: '#27ae60' }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    function resetTest() { currentColumn = 0; statsData = []; showScreen('screen-setup'); }
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    window.addEventListener('keydown', (e) => {
        const map = { 'a':0, 'b':1, 'c':2, 'd':3, 'e':4 };
        if(map[e.key.toLowerCase()] !== undefined) hit(map[e.key.toLowerCase()]);
    });
</script>
</body>
</html>
