<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAT KECERMATAN - SISTEM SIMULASI</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #1a252f; --accent: #f39c12; --success: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; justify-content: center; user-select: none; }
        .container { background: white; width: 100%; max-width: 900px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--primary); color: white; padding: 15px; text-align: center; border-bottom: 5px solid var(--accent); }
        .screen { display: none; padding: 20px; text-align: center; }
        .active { display: block; }
        
        /* SETUP */
        .setup-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin: 15px 0; }
        .input-group { background: #fff; padding: 10px; border-radius: 8px; border: 1px solid #ddd; position: relative; }
        input[type="text"] { width: 100%; border: none; text-align: center; font-weight: bold; font-size: 1.1rem; outline: none; text-transform: uppercase; letter-spacing: 2px; background: transparent; }

        /* GAMEPLAY */
        .stats-bar { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; background: #f9f9f9; padding: 10px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #eee; }
        .timer { font-size: 3rem; font-weight: 800; color: var(--danger); grid-column: 2; }
        .key-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 10px; }
        .key-box { border: 2px solid #2c3e50; border-radius: 8px; background: #fff; overflow: hidden; }
        .key-h { background: #2c3e50; color: white; padding: 3px; font-size: 0.8rem; }
        .key-v { font-size: 2.2rem; padding: 5px; font-weight: 900; }
        #question { font-size: 5rem; font-weight: 900; letter-spacing: 15px; margin: 25px 0; color: #1a252f; min-height: 120px; text-transform: uppercase; }
        .ans-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .btn-ans { padding: 20px 0; font-size: 1.8rem; border: none; background: var(--primary); color: white; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-ans:active { transform: scale(0.95); background: var(--accent); }
        
        /* RESULTS */
        table { width: 100%; border-collapse: collapse; margin: 15px 0; font-size: 0.85rem; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        .final-score-box { background: var(--primary); color: var(--accent); padding: 20px; border-radius: 15px; margin: 15px 0; }
        
        /* JEDA */
        .overlay-jeda { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .jeda-box { background: white; padding: 40px; border-radius: 20px; text-align: center; border-bottom: 8px solid var(--accent); min-width: 300px; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="container">
    <div class="header"><h3 id="user-display" style="margin:0">MENGHUBUNGKAN...</h3></div>

    <div id="screen-setup" class="screen active">
        <h3 style="margin:0; color:var(--primary);">PENGATURAN KOLOM</h3>
        <p style="font-size: 0.8rem; color: #666;">Isi simbol unik untuk tiap kolom.</p>
        <div class="setup-grid" id="input-fields"></div>
        <div style="display:flex; gap:10px;">
            <button onclick="autoFill()" style="flex:1; padding:12px; cursor:pointer; font-weight:bold; border-radius:8px; border:1px solid #ccc; background:#eee;">ACAK SIMBOL</button>
            <button onclick="window.mulai()" style="flex:2; background:var(--success); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer; font-size:1.1rem;">MULAI UJIAN</button>
        </div>
    </div>

    <div id="screen-game" class="screen">
        <div class="stats-bar">
            <div id="col-title" style="font-weight: 900; font-size: 1.2rem;">KOLOM 1</div>
            <div class="timer" id="timer">15</div>
            <div></div>
        </div>
        <div class="key-row" id="key-container"></div>
        <div id="question">----</div>
        <div class="ans-grid">
            <button class="btn-ans" onclick="window.jawab(0)">A</button>
            <button class="btn-ans" onclick="window.jawab(1)">B</button>
            <button class="btn-ans" onclick="window.jawab(2)">C</button>
            <button class="btn-ans" onclick="window.jawab(3)">D</button>
            <button class="btn-ans" onclick="window.jawab(4)">E</button>
        </div>
    </div>

    <div id="screen-result" class="screen">
        <h3>HASIL AKHIR</h3>
        <div class="final-score-box">
            <h1 style="font-size: 4rem; margin:0;" id="res-total">0</h1>
            <div id="aspek-list" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px; font-size:0.9rem;"></div>
        </div>
        <div style="height: 250px; margin: 20px 0;"><canvas id="taliChart"></canvas></div>
        <button class="btn-ans" style="background:var(--success); font-size:1rem; width:200px;" onclick="window.resetUjian()">UJIAN BARU</button>
        
        <div style="margin-top:20px; text-align:left;">
            <h4>RIWAYAT TERAKHIR</h4>
            <table id="history-table">
                <thead><tr style="background:#eee;"><th>Waktu</th><th>Skor</th></tr></thead>
                <tbody id="history-body"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="popup-jeda" class="overlay-jeda">
    <div class="jeda-box">
        <h2 style="margin:0;">KOLOM SELESAI</h2>
        <div id="jeda-countdown" style="font-size: 6rem; font-weight: 900; color: var(--danger); margin: 10px 0;">3</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, push, set, onValue, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCT6bL4sZxLEFr_wyxAW7VPRxLukNQ02mw", 
        authDomain: "simulasi-2b93b.firebaseapp.com", 
        databaseURL: "https://simulasi-2b93b-default-rtdb.firebaseio.com", 
        projectId: "simulasi-2b93b", 
        storageBucket: "simulasi-2b93b.firebasestorage.app", 
        appId: "1:562508858666:web:fa63f71ec175c675e64a53" 
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let allKeys = [], currentCol = 0, b = 0, s = 0, stats = [], timerId, correctIdx = -1, isPaused = false;

    // --- SECURITY: SINGLE SESSION ---
    function initSession(user) {
        const currentId = Date.now().toString();
        const sRef = ref(db, `user_sessions/${user.uid}`);
        set(sRef, { sessionId: currentId });
        onValue(sRef, (snap) => {
            if (snap.val() && snap.val().sessionId !== currentId) {
                alert("Akun login di perangkat lain!");
                signOut(auth).then(() => location.href = "index.html");
            }
        });
    }

    onAuthStateChanged(auth, (user) => {
        if (!user) { location.href = "index.html"; return; }
        initSession(user);
        document.getElementById('user-display').innerText = "PESERTA: " + user.email.split('@')[0].toUpperCase();
        checkProgress();
    });

    // --- SETUP INPUTS ---
    const inputArea = document.getElementById('input-fields');
    for(let i=0; i<10; i++) {
        const div = document.createElement('div');
        div.className = 'input-group';
        div.innerHTML = `<b>K${i+1}</b> <input type="text" id="in-${i}" maxlength="5" value="ABCDE">`;
        inputArea.appendChild(div);
    }

    window.autoFill = () => {
        const p = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
        for(let i=0; i<10; i++) {
            document.getElementById(`in-${i}`).value = p.split("").sort(()=>Math.random()-0.5).slice(0,5).join("");
        }
    };

    // --- ENGINE ---
    window.mulai = () => {
        allKeys = []; let toSave = [];
        for(let i=0; i<10; i++) {
            let val = document.getElementById(`in-${i}`).value.toUpperCase();
            allKeys.push(val.split('')); toSave.push(val);
        }
        localStorage.setItem('last_symbols', JSON.stringify(toSave));
        currentCol = 0; stats = []; 
        saveProgress('running'); showS('screen-game'); run();
    };

    function run() {
        b = 0; s = 0; isPaused = false;
        document.getElementById('col-title').innerText = `KOLOM ${currentCol + 1}`;
        let h = ""; 
        allKeys[currentCol].forEach((k, i) => {
            h += `<div class="key-box"><div class="key-h">${['A','B','C','D','E'][i]}</div><div class="key-v">${k}</div></div>`;
        });
        document.getElementById('key-container').innerHTML = h;
        makeQ(); startT();
    }

    function makeQ() {
        correctIdx = Math.floor(Math.random() * 5);
        let q = allKeys[currentCol].filter((_, i) => i !== correctIdx).sort(() => Math.random() - 0.5);
        document.getElementById('question').innerText = q.join('');
    }

    window.jawab = (idx) => { if(!isPaused) { (idx === correctIdx) ? b++ : s++; makeQ(); } };

    function startT() {
        let t = 15; document.getElementById('timer').innerText = t;
        clearInterval(timerId);
        timerId = setInterval(() => {
            t--; document.getElementById('timer').innerText = t;
            if(t <= 0) {
                clearInterval(timerId); isPaused = true;
                stats.push({ col: currentCol + 1, b: b, s: s });
                currentCol++; saveProgress('running');
                if(currentCol < 10) {
                    document.getElementById('popup-jeda').style.display = 'flex';
                    let j = 3;
                    const intJ = setInterval(() => {
                        j--; document.getElementById('jeda-countdown').innerText = j;
                        if(j <= 0) { clearInterval(intJ); document.getElementById('popup-jeda').style.display = 'none'; document.getElementById('jeda-countdown').innerText = 3; run(); }
                    }, 1000);
                } else { finish(); }
            }
        }, 1000);
    }

    function finish() {
        showS('screen-result'); saveProgress('finished');
        const bList = stats.map(d => d.b), sList = stats.map(d => d.s);
        const totB = bList.reduce((a,x)=>a+x,0), totS = sList.reduce((a,x)=>a+x,0), totT = totB + totS;

        let panker = totT / 10;
        let tianker = totT > 0 ? (totB / totT) * 100 : 0;
        let janker = 100 - ((Math.max(...bList) - Math.min(...bList)) * 5);
        let hanker = (bList[7] + bList[8] + bList[9]) / 3 * 2;
        let final = (Math.min(panker*2, 100)*0.3) + (tianker*0.4) + (Math.max(0, janker)*0.15) + (Math.min(hanker, 100)*0.15);

        document.getElementById('res-total').innerText = final.toFixed(1);
        document.getElementById('aspek-list').innerHTML = `
            <div style="background:#f1f1f1;padding:5px">Panker: ${panker.toFixed(1)}</div>
            <div style="background:#f1f1f1;padding:5px">Tianker: ${tianker.toFixed(1)}%</div>
            <div style="background:#f1f1f1;padding:5px">Janker: ${Math.max(0,janker).toFixed(1)}</div>
            <div style="background:#f1f1f1;padding:5px">Hanker: ${Math.min(hanker,100).toFixed(1)}</div>
        `;

        new Chart(document.getElementById('taliChart'), {
            type: 'line',
            data: {
                labels: stats.map(d => "K" + d.col),
                datasets: [
                    { label: 'Benar', data: bList, borderColor: '#27ae60', backgroundColor: 'rgba(39,174,96,0.1)', fill: true, tension: 0.4 },
                    { label: 'Salah', data: sList, borderColor: '#f39c12', backgroundColor: 'rgba(243,156,18,0.1)', fill: true, tension: 0.4 }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        push(ref(db, 'rekap_skor'), { nama: auth.currentUser.email, skor: final.toFixed(1), waktu: new Date().toLocaleString('id-ID') });
        loadMyHistory();
    }

    // --- UTILS ---
    function checkProgress() {
        const saved = localStorage.getItem('cat_kecermatan_progress');
        if (saved) {
            const data = JSON.parse(saved);
            if (data.status === 'running' && data.currentCol < 10) {
                if(confirm("Lanjut sesi sebelumnya?")) {
                    allKeys = data.allKeys; stats = data.stats; currentCol = data.currentCol;
                    showS('screen-game'); run(); return;
                }
            }
        }
        loadSavedSymbols();
    }

    function loadSavedSymbols() {
        const saved = JSON.parse(localStorage.getItem('last_symbols') || "[]");
        for(let i=0; i<10; i++) if(saved[i]) document.getElementById(`in-${i}`).value = saved[i];
    }

    function saveProgress(s) { localStorage.setItem('cat_kecermatan_progress', JSON.stringify({allKeys, stats, currentCol, status: s})); }
    window.resetUjian = () => { localStorage.removeItem('cat_kecermatan_progress'); location.reload(); };
    function showS(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    function loadMyHistory() {
        const qH = query(ref(db, 'rekap_skor'), orderByChild('nama'), equalTo(auth.currentUser.email));
        onValue(qH, (s) => {
            let h = ""; const d = s.val();
            if(d) Object.values(d).reverse().slice(0,5).forEach(i => h += `<tr><td>${i.waktu}</td><td>${i.skor}</td></tr>`);
            document.getElementById('history-body').innerHTML = h;
        });
    }
    window.addEventListener('keydown', (e) => { const m = {'a':0,'b':1,'c':2,'d':3,'e':4}; if(m[e.key.toLowerCase()] !== undefined) window.jawab(m[e.key.toLowerCase()]); });
</script>
</body>
</html>
