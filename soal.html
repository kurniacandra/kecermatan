<!DOCTYPE html>
<html lang="id">
<head>
    <script>
        if (sessionStorage.getItem("statusLogin") !== "aktif") {
            alert("Akses ditolak! Silakan login terlebih dahulu.");
            window.location.href = "index.html";
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulasi Kecermatan - KurniaCandra</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #f39c12; --success: #27ae60; --danger: #e74c3c; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--light); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { background: white; width: 100%; max-width: 900px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; min-height: 95vh; }
        .header { background: var(--primary); color: white; padding: 10px; text-align: center; border-bottom: 4px solid var(--accent); }
        .header h1 { margin: 0; font-size: 1.2rem; }
        .screen { display: none; padding: 20px; text-align: center; flex-grow: 1; }
        .active { display: block; }
        
        /* Layout Angka Kunci */
        .key-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 20px; }
        .key-box { border: 2px solid #333; border-radius: 8px; position: relative; background: #fff; height: 110px; display: flex; flex-direction: column; }
        .key-head { background: #333; color: white; padding: 3px; font-weight: bold; font-size: 1rem; }
        .key-val { font-size: 2.5rem; font-weight: 900; color: #000; flex-grow: 1; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        
        /* Tombol Jawaban Kecil di Kiri Bawah */
        .ans-container { position: absolute; bottom: 5px; left: 5px; display: flex; gap: 3px; }
        .btn-mini { width: 22px; height: 22px; font-size: 0.7rem; border: 1px solid #ccc; background: #f0f0f0; cursor: pointer; font-weight: bold; border-radius: 3px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-mini:hover { background: var(--accent); color: white; }

        /* Soal */
        #question { font-size: 5rem; font-weight: 900; letter-spacing: 15px; margin: 30px 0; color: #000; user-select: none; border: 2px dashed #ccc; padding: 10px; border-radius: 10px; }
        
        /* Stats & Timer */
        .stats-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: #eee; padding: 10px; border-radius: 8px; }
        .timer-box { font-size: 2rem; font-weight: 800; color: var(--danger); }

        /* Others */
        .setup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .input-group { display: flex; align-items: center; background: #fff; padding: 8px; border: 1px solid #ccc; border-radius: 5px; }
        .input-group label { width: 50px; font-weight: bold; }
        input[type="text"] { flex: 1; border: none; outline: none; text-align: center; font-weight: bold; text-transform: uppercase; }
        .btn-main { padding: 12px 25px; font-size: 1rem; border: none; background: var(--primary); color: white; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .credit-footer { background: #f9f9f9; padding: 10px; text-align: center; font-size: 0.8rem; border-top: 1px solid #eee; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h1>CAT PSIKOTES - KECERMATAN</h1></div>

    <div id="screen-setup" class="screen active">
        <h3>Input Karakter (10 Kolom)</h3>
        <div class="setup-grid" id="input-fields"></div>
        <button class="btn-main" style="background: var(--success);" onclick="validateAndStart()">MULAI SIMULASI</button>
    </div>

    <div id="screen-game" class="screen">
        <div class="stats-top">
            <div id="col-info" style="font-weight:bold;">KOLOM 1</div>
            <div class="timer-box" id="timer">60</div>
            <div>B: <span id="live-b" style="color:var(--success)">0</span> | S: <span id="live-s" style="color:var(--danger)">0</span></div>
        </div>

        <div class="key-row">
            <div class="key-box"><div class="key-head">A</div><div class="key-val" id="v0"></div>
                <div class="ans-container"><button class="btn-mini" onclick="hit(0)">A</button><button class="btn-mini" onclick="hit(1)">B</button><button class="btn-mini" onclick="hit(2)">C</button><button class="btn-mini" onclick="hit(3)">D</button><button class="btn-mini" onclick="hit(4)">E</button></div>
            </div>
            <div class="key-box"><div class="key-head">B</div><div class="key-val" id="v1"></div>
                <div class="ans-container"><button class="btn-mini" onclick="hit(0)">A</button><button class="btn-mini" onclick="hit(1)">B</button><button class="btn-mini" onclick="hit(2)">C</button><button class="btn-mini" onclick="hit(3)">D</button><button class="btn-mini" onclick="hit(4)">E</button></div>
            </div>
            <div class="key-box"><div class="key-head">C</div><div class="key-val" id="v2"></div>
                <div class="ans-container"><button class="btn-mini" onclick="hit(0)">A</button><button class="btn-mini" onclick="hit(1)">B</button><button class="btn-mini" onclick="hit(2)">C</button><button class="btn-mini" onclick="hit(3)">D</button><button class="btn-mini" onclick="hit(4)">E</button></div>
            </div>
            <div class="key-box"><div class="key-head">D</div><div class="key-val" id="v3"></div>
                <div class="ans-container"><button class="btn-mini" onclick="hit(0)">A</button><button class="btn-mini" onclick="hit(1)">B</button><button class="btn-mini" onclick="hit(2)">C</button><button class="btn-mini" onclick="hit(3)">D</button><button class="btn-mini" onclick="hit(4)">E</button></div>
            </div>
            <div class="key-box"><div class="key-head">E</div><div class="key-val" id="v4"></div>
                <div class="ans-container"><button class="btn-mini" onclick="hit(0)">A</button><button class="btn-mini" onclick="hit(1)">B</button><button class="btn-mini" onclick="hit(2)">C</button><button class="btn-mini" onclick="hit(3)">D</button><button class="btn-mini" onclick="hit(4)">E</button></div>
            </div>
        </div>

        <div id="question">----</div>
        <p style="font-size: 0.8rem; color: #777;">Gunakan Mouse atau Keyboard (A, B, C, D, E)</p>
    </div>

    <div id="screen-result" class="screen">
        <div class="aspek-container">
            <div class="aspek-card"><h4>Skor Akhir</h4><div id="res-total">0</div></div>
            <div class="aspek-card"><h4>Ketepatan</h4><div id="res-ketepatan">0</div></div>
            <div class="aspek-card"><h4>Ketahanan</h4><div id="res-ketahanan">0</div></div>
        </div>
        <div id="final-table"></div>
        <div style="height: 250px; margin-top: 15px;"><canvas id="myChart"></canvas></div>
        <button class="btn-main" style="background:var(--success); margin-top:15px;" onclick="resetTest()">ULANGI</button>
    </div>

    <div class="credit-footer">
        Aplikasi Simulasi &copy; 2026 | <a href="https://www.instagram.com/kurniacandraa_/" target="_blank" style="text-decoration:none; font-weight:bold; color:var(--primary);">By KurniaCandra</a>
    </div>
</div>

<script>
    const TOTAL_COL = 10, TIME_LIMIT = 60;
    let allColumnKeys = [], currentColumn = 0, scoreCorrect = 0, scoreWrong = 0, statsData = [], timerId, currentCorrectIdx = -1, myChart;

    const examples = ["ABCDE", "12345", "QWERT", "@#$%&", "ASDFG", "67890", "ZXCVB", "!*()+", "MNBVC", "YUIOP"];
    const inputArea = document.getElementById('input-fields');
    for(let i=0; i<TOTAL_COL; i++) {
        inputArea.innerHTML += `<div class="input-group"><label>K-${i+1}</label><input type="text" id="input-${i}" maxlength="5" placeholder="${examples[i]}"></div>`;
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function validateAndStart() {
        allColumnKeys = [];
        for(let i=0; i<TOTAL_COL; i++) {
            let val = document.getElementById(`input-${i}`).value.replace(/\s/g, '').toUpperCase() || examples[i];
            if(val.length !== 5) return alert(`Kolom ${i+1} harus 5 karakter!`);
            allColumnKeys.push(val.split(''));
        }
        showScreen('screen-game');
        runColumn();
    }

    function runColumn() {
        scoreCorrect = 0; scoreWrong = 0;
        document.getElementById('live-b').innerText = 0;
        document.getElementById('live-s').innerText = 0;
        document.getElementById('col-info').innerText = `KOLOM ${currentColumn + 1}`;
        let keys = allColumnKeys[currentColumn];
        for(let i=0; i<5; i++) document.getElementById('v'+i).innerText = keys[i];
        newQuestion(); startTimer();
    }

    function newQuestion() {
        currentCorrectIdx = Math.floor(Math.random() * 5);
        let keys = allColumnKeys[currentColumn];
        let q = keys.filter((_, idx) => idx !== currentCorrectIdx).sort(() => 0.5 - Math.random());
        document.getElementById('question').innerText = q.join('');
    }

    function hit(idx) {
        if(idx === currentCorrectIdx) scoreCorrect++; else scoreWrong++;
        document.getElementById('live-b').innerText = scoreCorrect;
        document.getElementById('live-s').innerText = scoreWrong;
        newQuestion();
    }

    function startTimer() {
        let left = TIME_LIMIT;
        document.getElementById('timer').innerText = left;
        clearInterval(timerId);
        timerId = setInterval(() => {
            left--; document.getElementById('timer').innerText = left;
            if(left <= 0) {
                clearInterval(timerId);
                statsData.push({ col: currentColumn+1, b: scoreCorrect, s: scoreWrong, total: scoreCorrect+scoreWrong });
                currentColumn++;
                if(currentColumn < TOTAL_COL) runColumn(); else finish();
            }
        }, 1000);
    }

    function finish() {
        showScreen('screen-result');
        const totalB = statsData.reduce((a, b) => a + b.b, 0);
        const totalT = statsData.reduce((a, b) => a + b.total, 0);
        let avgKec = totalT / TOTAL_COL;
        let pTepat = totalT > 0 ? (totalB / totalT) * 100 : 0;
        const bList = statsData.map(d => d.b);
        let ketahanan = Math.max(0, 100 - ((Math.max(...bList) - Math.min(...bList)) * 2));

        document.getElementById('res-total').innerText = ((avgKec * 0.3) + (pTepat * 0.5) + (ketahanan * 0.2)).toFixed(1);
        document.getElementById('res-ketepatan').innerText = pTepat.toFixed(1) + "%";
        document.getElementById('res-ketahanan').innerText = ketahanan.toFixed(1) + "%";

        let html = `<table><tr><th>K</th><th>B</th><th>S</th></tr>`;
        statsData.forEach(d => html += `<tr><td>${d.col}</td><td>${d.b}</td><td>${d.s}</td></tr>`);
        document.getElementById('final-table').innerHTML = html + `</table>`;

        if(myChart) myChart.destroy();
        myChart = new Chart(document.getElementById('myChart'), {
            type: 'line',
            data: { labels: statsData.map(d => d.col), datasets: [{label: 'Benar', data: bList, borderColor: '#27ae60', fill: false}] },
            options: { maintainAspectRatio: false }
        });
    }

    function resetTest() { currentColumn = 0; statsData = []; showScreen('screen-setup'); }

    window.addEventListener('keydown', (e) => {
        const m = { 'a':0, 'b':1, 'c':2, 'd':3, 'e':4 };
        if(m[e.key.toLowerCase()] !== undefined) hit(m[e.key.toLowerCase()]);
    });
</script>
</body>
</html>
