<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAT KECERMATAN</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #1a252f; --accent: #f39c12; --success: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; justify-content: center; user-select: none; }
        .container { background: white; width: 100%; max-width: 900px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--primary); color: white; padding: 15px; text-align: center; border-bottom: 5px solid var(--accent); }
        .screen { display: none; padding: 20px; text-align: center; }
        .active { display: block; }
        
        /* SETUP INPUT */
        .setup-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin: 15px 0; }
        .input-group { background: #fff; padding: 10px; border-radius: 8px; border: 1px solid #ddd; position: relative; transition: 0.3s; }
        .input-group.error { border: 2px solid var(--danger); background: #fff0f0; }
        input[type="text"] { width: 100%; border: none; text-align: center; font-weight: bold; font-size: 1.1rem; outline: none; background: transparent; text-transform: uppercase; letter-spacing: 2px; }
        .error-msg { color: var(--danger); font-size: 0.6rem; display: none; font-weight: bold; margin-top: 5px; line-height: 1.2; }
        .input-group.error .error-msg { display: block; }

        /* GAMEPLAY */
        .stats-bar { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; background: #f9f9f9; padding: 10px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #eee; }
        .timer { font-size: 3rem; font-weight: 800; color: var(--danger); grid-column: 2; }
        .key-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 10px; }
        .key-box { border: 2px solid #2c3e50; border-radius: 8px; background: #fff; overflow: hidden; }
        .key-h { background: #2c3e50; color: white; padding: 3px; font-size: 0.8rem; }
        .key-v { font-size: 2.2rem; padding: 5px; font-weight: 900; }
        #question { font-size: 5rem; font-weight: 900; letter-spacing: 15px; margin: 25px 0; color: #1a252f; min-height: 120px; text-transform: uppercase; }
        .ans-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .btn-ans { padding: 20px 0; font-size: 1.8rem; border: none; background: var(--primary); color: white; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-ans:active { transform: scale(0.95); background: var(--accent); }
        
        /* RESULTS & LEADERBOARD */
        table { width: 100%; border-collapse: collapse; margin: 15px 0; font-size: 0.85rem; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; font-weight: bold; }
        .history-section { margin-top: 30px; border-top: 2px dashed #ccc; padding-top: 20px; text-align: left; }
        .final-score-box { background: var(--primary); color: var(--accent); padding: 20px; border-radius: 15px; margin: 15px 0; }
        
        .overlay-jeda { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .jeda-box { background: white; padding: 40px; border-radius: 20px; text-align: center; border-bottom: 8px solid var(--accent); min-width: 300px; }
        
        .leaderboard-container { margin-top: 25px; padding: 15px; background: #fff; border: 1px solid #ddd; border-radius: 10px; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="container">
    <div class="header"><h3 id="user-display" style="margin:0">MENGHUBUNGKAN...</h3></div>

    <div id="screen-setup" class="screen active">
        <h3 style="margin:0; color:var(--primary);">PENGATURAN KOLOM</h3>
        <p style="font-size: 0.8rem; color: #666;">Isi simbol untuk 10 kolom pengerjaan.</p>
        <div class="setup-grid" id="input-fields"></div>
        <div style="display:flex; gap:10px;">
            <button onclick="autoFill()" style="flex:1; padding:12px; cursor:pointer; font-weight:bold; border-radius:8px; border:1px solid #ccc; background:#eee;">ACAK SIMBOL</button>
            <button onclick="window.mulai()" style="flex:2; background:var(--success); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer; font-size:1.1rem;">MULAI UJIAN</button>
        </div>

        <div class="leaderboard-container">
            <h4 style="margin:0 0 10px 0; color:var(--primary);">TOP 5 SKOR TERTINGGI</h4>
            <table>
                <thead><tr style="background:#eee;"><th>Rank</th><th>User</th><th>Skor</th></tr></thead>
                <tbody id="leaderboard-body"><tr><td colspan="3">Memuat peringkat...</td></tr></tbody>
            </table>
        </div>
    </div>

    <div id="screen-game" class="screen">
        <div class="stats-bar">
            <div id="col-title" style="font-weight: 900; font-size: 1.2rem;">KOLOM 1</div>
            <div class="timer" id="timer">15</div>
        </div>
        <div class="key-row" id="key-container"></div>
        <div id="question">----</div>
        <div class="ans-grid">
            <button class="btn-ans" onclick="window.jawab(0)">A</button>
            <button class="btn-ans" onclick="window.jawab(1)">B</button>
            <button class="btn-ans" onclick="window.jawab(2)">C</button>
            <button class="btn-ans" onclick="window.jawab(3)">D</button>
            <button class="btn-ans" onclick="window.jawab(4)">E</button>
        </div>
    </div>

    <div id="screen-result" class="screen">
        <h3 style="margin:0">HASIL PENILAIAN</h3>
        <div class="final-score-box">
            <h1 style="font-size: 4.5rem; margin:0;" id="res-total">0</h1>
            <div id="aspek-list" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px;"></div>
        </div>
        
        <div style="height: 300px; margin: 20px 0;"><canvas id="taliChart"></canvas></div>

        <div class="history-section">
            <h3 style="text-align: center;">RIWAYAT SKOR ANDA</h3>
            <table id="user-history-table">
                <thead><tr style="background: #eee;"><th>Waktu</th><th>Skor Akhir</th></tr></thead>
                <tbody id="history-body"><tr><td colspan="2">Memuat riwayat...</td></tr></tbody>
            </table>
        </div>

        <button class="btn-ans" style="background:var(--success); font-size:1rem; width:200px; margin-top:20px;" onclick="window.resetUjian()">UJIAN BARU</button>
    </div>
</div>

<div id="popup-jeda" class="overlay-jeda">
    <div class="jeda-box">
        <h2 style="margin:0;">KOLOM SELESAI</h2>
        <div id="jeda-countdown" style="font-size: 6rem; font-weight: 900; color: var(--danger); margin: 10px 0;">3</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, push, set, onValue, query, orderByChild, equalTo, limitToLast } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyCT6bL4sZxLEFr_wyxAW7VPRxLukNQ02mw", authDomain: "simulasi-2b93b.firebaseapp.com", databaseURL: "https://simulasi-2b93b-default-rtdb.firebaseio.com", projectId: "simulasi-2b93b", storageBucket: "simulasi-2b93b.firebasestorage.app", appId: "1:562508858666:web:fa63f71ec175c675e64a53" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let allKeys = [], currentCol = 0, b = 0, s = 0, stats = [], timerId, correctIdx = -1, isPaused = false;

    function initSecurity(user) {
        const sid = Date.now().toString();
        const sRef = ref(db, `user_sessions/${user.uid}`);
        set(sRef, { sessionId: sid });
        onValue(sRef, (snap) => {
            if (snap.val() && snap.val().sessionId !== sid) {
                alert("Akun login di perangkat lain!");
                signOut(auth).then(() => location.href = "index.html");
            }
        });
    }

    function loadLeaderboard() {
        const lbQuery = query(ref(db, 'rekap_skor'), orderByChild('skor'), limitToLast(20));
        onValue(lbQuery, (snap) => {
            let list = [];
            snap.forEach(child => { 
                let data = child.val();
                let skorAngka = parseFloat(data.skor) || 0;
                list.push({ nama: data.nama || "Anonim", skor: skorAngka });
            });
            list.sort((x, y) => y.skor - x.skor);
            let html = "";
            list.slice(0, 5).forEach((item, index) => {
                let namaUser = item.nama.split('@')[0].toUpperCase();
                html += `<tr><td>${index + 1}</td><td style="text-align:left; padding-left:15px;">${namaUser}</td><td style="font-weight:bold; color:var(--success);">${item.skor.toFixed(1)}</td></tr>`;
            });
            document.getElementById('leaderboard-body').innerHTML = html || "<tr><td colspan='3'>Belum ada data.</td></tr>";
        });
    }

    // FUNGSI RIWAYAT KHUSUS USER
    function loadUserHistory() {
        const historyBody = document.getElementById('history-body');
        if (!auth.currentUser) return;
        const userEmail = auth.currentUser.email;
        const q = query(ref(db, 'rekap_skor'), orderByChild('nama'), equalTo(userEmail));
        
        onValue(q, (snap) => {
            let results = [];
            snap.forEach(child => { results.push(child.val()); });
            results.reverse(); 
            let html = results.map(item => `<tr><td>${item.waktu}</td><td style="font-weight:bold; color:var(--primary);">${item.skor}</td></tr>`).join('');
            historyBody.innerHTML = html || "<tr><td colspan='2'>Belum ada riwayat.</td></tr>";
        });
    }

    onAuthStateChanged(auth, (user) => {
        if (!user) { window.location.href = "index.html"; return; }
        initSecurity(user);
        document.getElementById('user-display').innerText = "PESERTA: " + user.email.split('@')[0].toUpperCase();
        loadLeaderboard();
        loadUserHistory(); // BARIS PENTING: Memuat riwayat segera saat login
        checkProgress();
    });

    function validate(input, group) {
        const val = input.value.toUpperCase();
        const isDuplicate = new Set(val).size !== val.length;
        if (isDuplicate || val.length < 5) { group.classList.add('error'); return false; }
        group.classList.remove('error'); return true;
    }

    const inputArea = document.getElementById('input-fields');
    for(let i=0; i<10; i++) {
        const div = document.createElement('div');
        div.className = 'input-group'; div.id = `g-${i}`;
        div.innerHTML = `<b>K${i+1}</b> <input type="text" id="in-${i}" maxlength="5" placeholder="ABCDE" value="ABCDE"> <div class="error-msg">Wajib 5 Karakter Unik!</div>`;
        inputArea.appendChild(div);
        const inp = div.querySelector('input');
        inp.addEventListener('input', () => validate(inp, div));
    }

    window.autoFill = () => {
        const pool = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
        for(let i=0; i<10; i++) {
            let chunk = pool.split("").sort(() => Math.random() - 0.5).slice(0, 5).join("");
            document.getElementById(`in-${i}`).value = chunk;
            validate(document.getElementById(`in-${i}`), document.getElementById(`g-${i}`));
        }
    };

    function checkProgress() {
        const saved = localStorage.getItem('cat_kecermatan_progress');
        if (saved) {
            const data = JSON.parse(saved);
            if (data.status === 'running' && data.currentCol < 10) {
                if (confirm(`Lanjut Sesi Kolom ${data.currentCol + 1}?`)) {
                    allKeys = data.allKeys; stats = data.stats; currentCol = data.currentCol;
                    loadSymbolsToInput(allKeys); showS('screen-game'); run(); return;
                }
            }
        }
        resetStorage(false); loadSavedSymbols();
    }

    function loadSymbolsToInput(keys) { keys.forEach((s, i) => { document.getElementById(`in-${i}`).value = s.join(''); }); }
    function loadSavedSymbols() {
        const saved = JSON.parse(localStorage.getItem('last_symbols') || "[]");
        for(let i=0; i<10; i++) { if(saved[i]) document.getElementById(`in-${i}`).value = saved[i]; }
    }

    function saveProgress(status) { localStorage.setItem('cat_kecermatan_progress', JSON.stringify({ allKeys, stats, currentCol, status })); }
    function resetStorage(clear) { localStorage.removeItem('cat_kecermatan_progress'); if(clear) localStorage.removeItem('last_symbols'); }

    window.mulai = () => {
        allKeys = []; let valid = true; let toSave = [];
        for(let i=0; i<10; i++) {
            const el = document.getElementById(`in-${i}`);
            if(!validate(el, document.getElementById(`g-${i}`))) valid = false;
            allKeys.push(el.value.toUpperCase().split(''));
            toSave.push(el.value.toUpperCase());
        }
        if(!valid) { alert("Perbaiki kolom yang merah!"); return; }
        localStorage.setItem('last_symbols', JSON.stringify(toSave));
        currentCol = 0; stats = []; saveProgress('running');
        showS('screen-game'); run();
    };

    function run() {
        b = 0; s = 0; isPaused = false;
        document.getElementById('col-title').innerText = `KOLOM ${currentCol + 1}`;
        let h = ""; allKeys[currentCol].forEach((k, i) => {
            h += `<div class="key-box"><div class="key-h">${['A','B','C','D','E'][i]}</div><div class="key-v">${k}</div></div>`;
        });
        document.getElementById('key-container').innerHTML = h;
        makeQ(); startT();
    }

    function makeQ() {
        correctIdx = Math.floor(Math.random() * 5);
        let qArray = allKeys[currentCol].filter((_, i) => i !== correctIdx).sort(() => Math.random() - 0.5);
        document.getElementById('question').innerText = qArray.join('');
    }

    window.jawab = (idx) => { if(!isPaused) { (idx === correctIdx) ? b++ : s++; makeQ(); } };

    function startT() {
        let t = 1; document.getElementById('timer').innerText = t;
        clearInterval(timerId);
        timerId = setInterval(() => {
            t--; document.getElementById('timer').innerText = t;
            if(t <= 0) {
                clearInterval(timerId); isPaused = true;
                stats.push({ col: currentCol + 1, b: b, s: s });
                currentCol++; saveProgress('running');
                if(currentCol < 10) tampilkanJeda(); else finish();
            }
        }, 1000);
    }

    function tampilkanJeda() {
        const p = document.getElementById('popup-jeda'); let sisa = 3;
        p.style.display = 'flex'; document.getElementById('jeda-countdown').innerText = sisa;
        const intJ = setInterval(() => { sisa--; document.getElementById('jeda-countdown').innerText = sisa; if(sisa <= 0) { clearInterval(intJ); p.style.display = 'none'; run(); }}, 1000);
    }

    function finish() {
        showS('screen-result'); saveProgress('finished');
        const bList = stats.map(d => d.b), sList = stats.map(d => d.s);
        const totB = bList.reduce((a,x) => a+x, 0), totS = sList.reduce((a,x) => a+x, 0), totT = totB + totS;

        let panker = totT / 10, tianker = totT > 0 ? (totB / totT) * 100 : 0;
        let janker = 100 - ((Math.max(...bList) - Math.min(...bList)) * 5);
        let hanker = (bList[7] + bList[8] + bList[9]) / 3 * 2;
        let final = (Math.min(panker*2, 100)*0.3) + (tianker*0.4) + (Math.max(0, janker)*0.15) + (Math.min(hanker, 100)*0.15);

        let gradeLabel = final >= 80 ? "SANGAT BAIK (ST)" : final >= 65 ? "BAIK (T)" : final >= 50 ? "CUKUP (C)" : final >= 40 ? "KURANG (K)" : "SANGAT KURANG (SK)";
        let gradeColor = final >= 80 ? "#1b5e20" : final >= 65 ? "#2e7d32" : final >= 50 ? "#f9a825" : "#d32f2f";

        document.getElementById('res-total').innerHTML = `<div style="color:${gradeColor}">${final.toFixed(1)}</div><div style="font-size:1.2rem;font-weight:800;color:white;background:${gradeColor};padding:5px 15px;border-radius:50px;display:inline-block;margin-top:10px;">${gradeLabel}</div>`;
        document.getElementById('aspek-list').innerHTML = `<div style="background:#f1f1f1;padding:8px;border-radius:5px">Kecepatan: ${panker.toFixed(1)}</div><div style="background:#f1f1f1;padding:8px;border-radius:5px">Ketelitian: ${tianker.toFixed(1)}%</div><div style="background:#f1f1f1;padding:8px;border-radius:5px">Kestabilan: ${Math.max(0,janker).toFixed(1)}</div><div style="background:#f1f1f1;padding:8px;border-radius:5px">Ketahanan: ${Math.min(hanker,100).toFixed(1)}</div>`;

        new Chart(document.getElementById('taliChart'), {
            type: 'line',
            data: {
                labels: stats.map(d => "K" + d.col),
                datasets: [
                    { label: 'Benar', data: bList, borderColor: '#27ae60', backgroundColor: 'rgba(39,174,96,0.1)', borderWidth: 4, tension: 0.4, fill: true, pointRadius: 5 },
                    { label: 'Salah', data: sList, borderColor: '#f39c12', backgroundColor: 'rgba(243,156,18,0.1)', borderWidth: 4, tension: 0.4, fill: true, pointRadius: 5 }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false } }
        });

        push(ref(db, 'rekap_skor'), { 
            nama: auth.currentUser.email, 
            skor: parseFloat(final.toFixed(1)), 
            waktu: new Date().toLocaleTimeString('id-ID') + " " + new Date().toLocaleDateString('id-ID'),
            pola_benar: bList,
            pola_salah: sList,
            kecepatan: panker.toFixed(1),
            ketelitian: tianker.toFixed(1),
            kestabilan: Math.max(0,janker).toFixed(1),
            ketahanan: Math.min(hanker,100).toFixed(1)
        }).then(() => {
            loadUserHistory(); 
        });
    }

    window.resetUjian = () => { resetStorage(false); location.reload(); };
    function showS(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    window.addEventListener('keydown', (e) => { const m = {'a':0,'b':1,'c':2,'d':3,'e':4}; if(m[e.key.toLowerCase()] !== undefined) window.jawab(m[e.key.toLowerCase()]); });
</script>
</body>
</html>
