<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAT v6.5 - Fixed Interval Jeda</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #1a252f; --accent: #f39c12; --success: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; justify-content: center; user-select: none; }
        .container { background: white; width: 100%; max-width: 900px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--primary); color: white; padding: 15px; text-align: center; border-bottom: 5px solid var(--accent); }
        .screen { display: none; padding: 20px; text-align: center; }
        .active { display: block; }
        .setup-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 8px; margin: 15px 0; }
        .input-group { background: #fff; padding: 8px; border-radius: 8px; border: 1px solid #ddd; display: flex; align-items: center; }
        input[type="text"] { width: 100%; border: none; text-align: center; font-weight: bold; font-size: 1rem; text-transform: uppercase; outline: none; }
        .stats-bar { display: flex; justify-content: space-between; align-items: center; background: #f9f9f9; padding: 10px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #eee; }
        .timer { font-size: 3rem; font-weight: 800; color: var(--danger); }
        .key-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 10px; }
        .key-box { border: 2px solid #2c3e50; border-radius: 8px; background: #fff; overflow: hidden; }
        .key-h { background: #2c3e50; color: white; padding: 3px; font-size: 0.8rem; }
        .key-v { font-size: 2.2rem; padding: 5px; font-weight: 900; }
        #question { font-size: 5rem; font-weight: 900; letter-spacing: 15px; margin: 25px 0; color: #1a252f; min-height: 120px; }
        .ans-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .btn-ans { padding: 20px 0; font-size: 1.8rem; border: none; background: var(--primary); color: white; border-radius: 10px; cursor: pointer; font-weight: bold; }
        
        /* OVERLAY JEDA (HITAM) */
        .overlay-jeda { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .jeda-box { background: white; padding: 40px; border-radius: 20px; text-align: center; border-bottom: 8px solid var(--accent); min-width: 300px; }
        .jeda-timer { font-size: 6rem; font-weight: 900; color: var(--danger); margin: 10px 0; }

        table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; font-weight: bold; }
        .final-score-box { background: var(--primary); color: var(--accent); padding: 20px; border-radius: 15px; margin: 15px 0; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="container">
    <div class="header"><h3 id="user-display" style="margin:0">MEMUAT...</h3></div>

    <div id="screen-setup" class="screen active">
        <h4>PENGATURAN KARAKTER</h4>
        <div class="setup-grid" id="input-fields"></div>
        <button class="btn-ans" style="background: var(--success); width: 100%; font-size: 1.2rem;" onclick="window.mulai()">MULAI SIMULASI</button>
    </div>

    <div id="screen-game" class="screen">
        <div class="stats-bar">
            <div id="col-title" style="font-weight: 900; font-size: 1.2rem;">KOLOM 1</div>
            <div class="timer" id="timer">60</div>
            <div style="text-align: right;">
                <b style="color:var(--success)">B: <span id="live-b">0</span></b><br>
                <b style="color:var(--danger)">S: <span id="live-s">0</span></b>
            </div>
        </div>
        <div class="key-row" id="key-container"></div>
        <div id="question">----</div>
        <div class="ans-grid">
            <button class="btn-ans" onclick="window.jawab(0)">A</button>
            <button class="btn-ans" onclick="window.jawab(1)">B</button>
            <button class="btn-ans" onclick="window.jawab(2)">C</button>
            <button class="btn-ans" onclick="window.jawab(3)">D</button>
            <button class="btn-ans" onclick="window.jawab(4)">E</button>
        </div>
    </div>

    <div id="screen-result" class="screen">
        <h3>HASIL AKHIR</h3>
        <div class="final-score-box">
            <h1 style="font-size: 4rem; margin:0;" id="res-total">0</h1>
            <div id="aspek-list" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px;"></div>
        </div>
        <div id="rekap-tabel" style="overflow-x:auto;"></div>
        <button class="btn-ans" style="background:var(--success); font-size:1rem; width:200px;" onclick="window.ulang()">ULANGI</button>
    </div>
</div>

<div id="popup-jeda" class="overlay-jeda">
    <div class="jeda-box">
        <h2 style="margin:0; color:#333;">KOLOM SELESAI</h2>
        <p style="color:#666;">Persiapan kolom berikutnya dalam:</p>
        <div id="jeda-countdown" class="jeda-timer">5</div>
        <p style="font-weight:bold; color:var(--primary);">SIAPKAN JARI ANDA!</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, push, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCT6bL4sZxLEFr_wyxAW7VPRxLukNQ02mw",
        authDomain: "simulasi-2b93b.firebaseapp.com",
        databaseURL: "https://simulasi-2b93b-default-rtdb.firebaseio.com",
        projectId: "simulasi-2b93b",
        storageBucket: "simulasi-2b93b.firebasestorage.app",
        appId: "1:562508858666:web:fa63f71ec175c675e64a53"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let allKeys = [], currentCol = 0, b = 0, s = 0, stats = [], timerId, correctIdx = -1;
    const def = ["ABCDE", "12345", "QWERT", "@#$%&", "ASDFG", "67890", "ZXCVB", "!*()+", "MNBVC", "YUIOP"];

    const inputArea = document.getElementById('input-fields');
    for(let i=0; i<10; i++) {
        inputArea.innerHTML += `<div class="input-group"><b>K${i+1}</b><input type="text" id="in-${i}" maxlength="5" placeholder="${def[i]}"></div>`;
    }

    onAuthStateChanged(auth, (user) => {
        if (!user) { window.location.href = "index.html"; return; }
        document.getElementById('user-display').innerText = "PESERTA: " + user.email.split('@')[0].toUpperCase();
        
        // RECOVERY
        const sk = localStorage.getItem("cat_keys");
        const sc = localStorage.getItem("cat_col");
        if (sk && sc !== null) {
            allKeys = JSON.parse(sk);
            currentCol = parseInt(sc);
            stats = JSON.parse(localStorage.getItem("cat_stats") || "[]");
            showS('screen-game');
            run();
        }
    });

    window.mulai = () => {
        allKeys = [];
        for(let i=0; i<10; i++) allKeys.push((document.getElementById(`in-${i}`).value || def[i]).toUpperCase().split(''));
        localStorage.setItem("cat_keys", JSON.stringify(allKeys));
        currentCol = 0; stats = [];
        showS('screen-game');
        run();
    };

    function run() {
        b = 0; s = 0;
        document.getElementById('live-b').innerText = 0;
        document.getElementById('live-s').innerText = 0;
        document.getElementById('col-title').innerText = `KOLOM ${currentCol + 1}`;
        
        let keysHtml = "";
        const labels = ['A','B','C','D','E'];
        allKeys[currentCol].forEach((k, i) => {
            keysHtml += `<div class="key-box"><div class="key-h">${labels[i]}</div><div class="key-v">${k}</div></div>`;
        });
        document.getElementById('key-container').innerHTML = keysHtml;

        localStorage.setItem("cat_col", currentCol);
        localStorage.setItem("cat_stats", JSON.stringify(stats));
        makeQ();
        startT();
    }

    function makeQ() {
        correctIdx = Math.floor(Math.random() * 5);
        let q = allKeys[currentCol].filter((_, i) => i !== correctIdx).sort(() => Math.random() - 0.5);
        document.getElementById('question').innerText = q.join('');
    }

    window.jawab = (idx) => {
        if(idx === correctIdx) b++; else s++;
        document.getElementById('live-b').innerText = b;
        document.getElementById('live-s').innerText = s;
        makeQ();
    };

    function startT() {
        let t = 60;
        document.getElementById('timer').innerText = t;
        clearInterval(timerId);
        timerId = setInterval(() => {
            t--; document.getElementById('timer').innerText = t;
            if(t <= 0) {
                clearInterval(timerId);
                // SIMPAN HASIL KOLOM INI
                stats.push({ col: currentCol + 1, b: b, s: s });
                currentCol++;

                // CEK APAKAH LANJUT ATAU FINISH
                if(currentCol < 10) {
                    tampilkanJeda(); // WAJIB JALAN DISINI
                } else {
                    finish();
                }
            }
        }, 1000);
    }

    function tampilkanJeda() {
        const popup = document.getElementById('popup-jeda');
        const timerC = document.getElementById('jeda-countdown');
        let sisa = 5;
        
        popup.style.display = 'flex'; // TAMPILKAN POPUP
        timerC.innerText = sisa;

        const intervalJeda = setInterval(() => {
            sisa--;
            timerC.innerText = sisa;
            if(sisa <= 0) {
                clearInterval(intervalJeda);
                popup.style.display = 'none'; // SEMBUNYIKAN POPUP
                run(); // JALANKAN KOLOM BERIKUTNYA
            }
        }, 1000);
    }

    function finish() {
        localStorage.removeItem("cat_keys"); localStorage.removeItem("cat_col"); localStorage.removeItem("cat_stats");
        showS('screen-result');
        const bList = stats.map(d => d.b);
        const totB = bList.reduce((a,x) => a+x, 0);
        const totT = totB + stats.map(d => d.s).reduce((a,x) => a+x, 0);

        let final = (totB / (10 * 50)) * 100; // Contoh rumus simpel
        document.getElementById('res-total').innerText = final.toFixed(1);

        let h = "<table><tr><th>DATA</th>" + stats.map(d => `<th>K${d.col}</th>`).join('') + "</tr>";
        h += "<tr><td>BENAR</td>" + bList.map(v => `<td>${v}</td>`).join('') + "</tr>";
        h += "<tr><td>SALAH</td>" + stats.map(d => `<td>${d.s}</td>`).join('') + "</tr></table>";
        document.getElementById('rekap-tabel').innerHTML = h;
    }

    window.ulang = () => { localStorage.clear(); location.reload(); };
    function showS(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
</script>
</body>
</html>
