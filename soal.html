<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAT KECERMATAN v16.0 - Stabil</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #1a252f; --accent: #f39c12; --success: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; justify-content: center; user-select: none; }
        .container { background: white; width: 100%; max-width: 900px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--primary); color: white; padding: 15px; text-align: center; border-bottom: 5px solid var(--accent); position: relative; }
        .screen { display: none; padding: 20px; text-align: center; }
        .active { display: block; }
        
        /* SETUP INPUT */
        .setup-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin: 15px 0; }
        .input-group { background: #fff; padding: 10px; border-radius: 8px; border: 1px solid #ddd; position: relative; }
        input[type="text"] { width: 100%; border: none; text-align: center; font-weight: bold; font-size: 1.1rem; outline: none; background: transparent; text-transform: uppercase; letter-spacing: 2px; }

        /* GAMEPLAY */
        .stats-bar { display: flex; justify-content: space-between; align-items: center; background: #f9f9f9; padding: 10px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #eee; }
        .timer { font-size: 3rem; font-weight: 800; color: var(--danger); }
        .key-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 10px; }
        .key-box { border: 2px solid #2c3e50; border-radius: 8px; background: #fff; overflow: hidden; }
        .key-h { background: #2c3e50; color: white; padding: 3px; font-size: 0.8rem; }
        .key-v { font-size: 2.2rem; padding: 5px; font-weight: 900; }
        #question { font-size: 5rem; font-weight: 900; letter-spacing: 15px; margin: 25px 0; color: #1a252f; min-height: 120px; text-transform: uppercase; }
        .ans-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .btn-ans { padding: 20px 0; font-size: 1.8rem; border: none; background: var(--primary); color: white; border-radius: 10px; cursor: pointer; font-weight: bold; }
        
        /* RESULTS */
        .final-score-box { background: var(--primary); color: var(--accent); padding: 20px; border-radius: 15px; margin: 15px 0; }
        .overlay-jeda { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        #lock-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); color: white; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; text-align: center; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="lock-overlay">
    <h1 style="font-size: 3rem; color:var(--danger);">⚠️ SESI BERAKHIR ⚠️</h1>
    <p>Akun login di perangkat lain. Sesi ini ditutup.</p>
    <button class="btn-ans" style="background:var(--accent); width:200px; margin-top:20px;" onclick="window.location.href='index.html'">LOGIN LAGI</button>
</div>

<div class="container">
    <div class="header">
        <h3 id="user-display" style="margin:0">MENGHUBUNGKAN...</h3>
    </div>

    <div id="screen-setup" class="screen active">
        <div class="setup-grid" id="input-fields"></div>
        <button onclick="window.mulai()" style="width:100%; background:var(--success); color:white; border:none; border-radius:8px; padding:15px; font-weight:bold; cursor:pointer; font-size:1.1rem;">MULAI UJIAN</button>
    </div>

    <div id="screen-game" class="screen">
        <div class="stats-bar">
            <div id="col-title" style="font-weight: 900;">KOLOM 1</div>
            <div class="timer" id="timer">15</div>
            <div><b style="color:var(--success)">B: <span id="live-b">0</span></b> | <b style="color:var(--danger)">S: <span id="live-s">0</span></b></div>
        </div>
        <div class="key-row" id="key-container"></div>
        <div id="question">----</div>
        <div class="ans-grid">
            <button class="btn-ans" onclick="window.jawab(0)">A</button>
            <button class="btn-ans" onclick="window.jawab(1)">B</button>
            <button class="btn-ans" onclick="window.jawab(2)">C</button>
            <button class="btn-ans" onclick="window.jawab(3)">D</button>
            <button class="btn-ans" onclick="window.jawab(4)">E</button>
        </div>
    </div>

    <div id="screen-result" class="screen">
        <div class="final-score-box">
            <h1 style="font-size: 4rem; margin:0;" id="res-total">0</h1>
            <div id="aspek-list" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px;"></div>
        </div>
        <div style="height: 250px; margin: 20px 0;"><canvas id="glowLineChart"></canvas></div>
        <button class="btn-ans" style="background:var(--success); font-size:1rem; width:200px;" onclick="location.reload()">ULANGI</button>
    </div>
</div>

<div id="popup-jeda" class="overlay-jeda">
    <div style="background:white; padding:40px; border-radius:20px; text-align:center;">
        <h2>KOLOM SELESAI</h2>
        <div id="jeda-countdown" style="font-size: 5rem; font-weight: 900; color: var(--danger);">3</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, set, onValue, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyCT6bL4sZxLEFr_wyxAW7VPRxLukNQ02mw", authDomain: "simulasi-2b93b.firebaseapp.com", databaseURL: "https://simulasi-2b93b-default-rtdb.firebaseio.com", projectId: "simulasi-2b93b", storageBucket: "simulasi-2b93b.firebasestorage.app", appId: "1:562508858666:web:fa63f71ec175c675e64a53" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let allKeys = [], currentCol = 0, b = 0, s = 0, stats = [], timerId, correctIdx = -1;
    const mySessId = 'sess_' + Math.random().toString(36).substr(2, 9);

    onAuthStateChanged(auth, (user) => {
        if (!user) { window.location.href = "index.html"; return; }
        document.getElementById('user-display').innerText = "PESERTA: " + user.email.split('@')[0].toUpperCase();

        const sRef = ref(db, 'user_sessions/' + user.uid);
        set(sRef, { sessionId: mySessId }); // Daftarkan sesi ini sebagai yang terbaru
        
        onValue(sRef, (snap) => {
            if (snap.val() && snap.val().sessionId !== mySessId) {
                document.getElementById('lock-overlay').style.display = 'flex';
                signOut(auth);
            }
        });
    });

    for(let i=0; i<10; i++) {
        const div = document.createElement('div');
        div.className = 'input-group';
        div.innerHTML = `<b>K${i+1}</b> <input type="text" id="in-${i}" maxlength="5" value="ABCDE">`;
        document.getElementById('input-fields').appendChild(div);
    }

    window.mulai = () => {
        allKeys = []; for(let i=0; i<10; i++){ allKeys.push(document.getElementById(`in-${i}`).value.toUpperCase().split('')); }
        currentCol = 0; stats = []; showS('screen-game'); run();
    };

    function run() {
        b = 0; s = 0;
        document.getElementById('live-b').innerText = 0; document.getElementById('live-s').innerText = 0;
        document.getElementById('col-title').innerText = `KOLOM ${currentCol + 1}`;
        let h = ""; allKeys[currentCol].forEach((k, i) => {
            h += `<div class="key-box"><div class="key-h">${['A','B','C','D','E'][i]}</div><div class="key-v">${k}</div></div>`;
        });
        document.getElementById('key-container').innerHTML = h;
        makeQ(); startT();
    }

    function makeQ() {
        correctIdx = Math.floor(Math.random() * 5);
        let q = allKeys[currentCol].filter((_, i) => i !== correctIdx).sort(() => Math.random() - 0.5);
        document.getElementById('question').innerText = q.join('');
    }

    window.jawab = (idx) => { if(idx === correctIdx) b++; else s++; document.getElementById('live-b').innerText = b; document.getElementById('live-s').innerText = s; makeQ(); };

    function startT() {
        let t = 15; document.getElementById('timer').innerText = t;
        clearInterval(timerId);
        timerId = setInterval(() => {
            t--; document.getElementById('timer').innerText = t;
            if (t <= 0) {
                clearInterval(timerId);
                stats.push({ col: currentCol + 1, b: b, s: s });
                currentCol++;
                if (currentCol < 10) {
                    const p = document.getElementById('popup-jeda'); let sisa = 3;
                    p.style.display = 'flex';
                    const ij = setInterval(() => { sisa--; document.getElementById('jeda-countdown').innerText = sisa; if(sisa<=0){ clearInterval(ij); p.style.display='none'; run(); }}, 1000);
                } else { finish(); }
            }
        }, 1000);
    }

    function finish() {
        showS('screen-result');
        const bList = stats.map(d => d.b);
        const totB = bList.reduce((a,x) => a+x, 0);
        const final = (totB / 10).toFixed(1);
        document.getElementById('res-total').innerText = final;
        
        new Chart(document.getElementById('glowLineChart'), {
            type: 'line', data: { labels: stats.map(d => "K"+d.col), datasets: [{ label:'Benar', data: bList, borderColor:'#27ae60', tension:0.4 }] }
        });
    }

    function showS(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    window.addEventListener('keydown', (e) => { const m = {'a':0,'b':1,'c':2,'d':3,'e':4}; if(m[e.key.toLowerCase()] !== undefined) window.jawab(m[e.key.toLowerCase()]); });
</script>
</body>
</html>
