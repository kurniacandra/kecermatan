<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAT Kecermatan - Official</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #f39c12; --success: #27ae60; --danger: #e74c3c; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--light); margin: 0; padding: 15px; display: flex; justify-content: center; user-select: none; }
        .container { background: white; width: 100%; max-width: 850px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; }
        .header { background: var(--primary); color: white; padding: 15px; text-align: center; border-bottom: 4px solid var(--accent); }
        .screen { display: none; padding: 25px; text-align: center; flex-grow: 1; }
        .active { display: block; }
        .setup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .input-group { display: flex; align-items: center; background: #fff; padding: 8px; border-radius: 5px; border: 1px solid #ccc; }
        input[type="text"] { flex: 1; padding: 8px; border: none; text-align: center; font-weight: bold; text-transform: uppercase; }
        .timer-box { font-size: 2.8rem; font-weight: 900; color: var(--danger); }
        .key-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 20px; }
        .key-box { border: 2px solid #333; border-radius: 8px; background: #fff; }
        .key-head { background: #333; color: white; padding: 5px; font-weight: bold; }
        .key-val { font-size: 2.2rem; padding: 12px; font-weight: bold; }
        #question { font-size: 5.5rem; font-weight: 900; letter-spacing: 25px; margin: 40px 0; color: #000; }
        .ans-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; }
        .btn-ans { padding: 22px; font-size: 1.8rem; border: none; background: var(--primary); color: white; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.1s; }
        .btn-ans:active { transform: scale(0.92); background: var(--accent); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        .total-score { background: var(--primary); color: white; padding: 20px; border-radius: 12px; font-size: 3rem; font-weight: 900; color: var(--accent); }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="container">
    <div class="header"><h1 id="peserta-nama">MEMUAT SISTEM...</h1></div>

    <div id="screen-setup" class="screen active">
        <h3>PENGATURAN KOLOM</h3>
        <div class="setup-grid" id="input-fields"></div>
        <button class="btn-ans" style="background: var(--success); width: 100%; max-width: 400px; font-size: 1.2rem;" onclick="mulaiUjian()">MULAI SIMULASI</button>
    </div>

    <div id="screen-game" class="screen">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <div id="col-info" style="font-weight: bold; font-size: 1.5rem;">KOLOM 1</div>
            <div class="timer-box" id="timer">60</div>
            <div style="font-size: 1.2rem;">B: <span id="live-b" style="color:var(--success); font-weight: bold;">0</span></div>
        </div>
        <div class="key-row">
            <div class="key-box"><div class="key-head">A</div><div class="key-val" id="v0"></div></div>
            <div class="key-box"><div class="key-head">B</div><div class="key-val" id="v1"></div></div>
            <div class="key-box"><div class="key-head">C</div><div class="key-val" id="v2"></div></div>
            <div class="key-box"><div class="key-head">D</div><div class="key-val" id="v3"></div></div>
            <div class="key-box"><div class="key-head">E</div><div class="key-val" id="v4"></div></div>
        </div>
        <div id="question">----</div>
        <div class="ans-grid">
            <button class="btn-ans" onclick="jawab(0)">A</button>
            <button class="btn-ans" onclick="jawab(1)">B</button>
            <button class="btn-ans" onclick="jawab(2)">C</button>
            <button class="btn-ans" onclick="jawab(3)">D</button>
            <button class="btn-ans" onclick="jawab(4)">E</button>
        </div>
    </div>

    <div id="screen-result" class="screen">
        <h2>HASIL AKHIR</h2>
        <div class="total-score" id="res-total">0</div>
        <div id="res-table"></div>
        <div style="height: 250px; margin-top: 20px;"><canvas id="myChart"></canvas></div>
        <button class="btn-ans" style="background:var(--success); margin-top:20px; font-size:1.1rem;" onclick="resetLengkap()">ULANGI DARI AWAL</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, onValue, push, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCT6bL4sZxLEFr_wyxAW7VPRxLukNQ02mw",
        authDomain: "simulasi-2b93b.firebaseapp.com",
        databaseURL: "https://simulasi-2b93b-default-rtdb.firebaseio.com",
        projectId: "simulasi-2b93b",
        storageBucket: "simulasi-2b93b.firebasestorage.app",
        appId: "1:562508858666:web:fa63f71ec175c675e64a53"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let allKeys = [], currentColumn = 0, b = 0, s = 0, stats = [], timerId, correctIdx = -1;

    // PROTEKSI LOGIN & REFRESH
    onAuthStateChanged(auth, (user) => {
        if (!user) { window.location.href = "index.html"; return; }
        
        document.getElementById('peserta-nama').innerText = "PESERTA: " + user.email.toUpperCase();
        const mySess = localStorage.getItem("sesi_aktif");

        // Cek Sesi (Agar tidak bentrok pas refresh)
        onValue(ref(db, 'active_sessions/' + user.uid), (snap) => {
            const data = snap.val();
            if (data && data.id_sesi !== mySess) {
                alert("Login terdeteksi di perangkat lain!");
                signOut(auth).then(() => { localStorage.clear(); window.location.href = "index.html"; });
            }
        });

        // RECOVERY DATA (Jika Refresh)
        const savedCol = localStorage.getItem("rec_col");
        const savedStats = localStorage.getItem("rec_stats");
        if(savedCol && savedStats) {
            currentColumn = parseInt(savedCol);
            stats = JSON.parse(savedStats);
            mulaiUjian();
        }
    });

    // Generate Input Fields
    const examples = ["ABCDE", "12345", "QWERT", "@#$%&", "ASDFG", "67890", "ZXCVB", "!*()+", "MNBVC", "YUIOP"];
    for(let i=0; i<10; i++) {
        document.getElementById('input-fields').innerHTML += `<div class="input-group"><label>K${i+1}</label><input type="text" id="in-${i}" maxlength="5" placeholder="${examples[i]}"></div>`;
    }

    window.mulaiUjian = () => {
        allKeys = [];
        for(let i=0; i<10; i++) {
            let val = document.getElementById(`in-${i}`).value.toUpperCase() || examples[i];
            allKeys.push(val.split(''));
        }
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-game').classList.add('active');
        jalankanKolom();
    };

    function jalankanKolom() {
        b = 0; s = 0;
        document.getElementById('live-b').innerText = 0;
        document.getElementById('col-info').innerText = `KOLOM ${currentColumn + 1}`;
        for(let i=0; i<5; i++) document.getElementById('v'+i).innerText = allKeys[currentColumn][i];
        
        // Simpan progres ke browser (Auto-save)
        localStorage.setItem("rec_col", currentColumn);
        localStorage.setItem("rec_stats", JSON.stringify(stats));
        
        buatSoal();
        mulaiTimer();
    }

    function buatSoal() {
        correctIdx = Math.floor(Math.random() * 5);
        let q = allKeys[currentColumn].filter((_, i) => i !== correctIdx).sort(() => Math.random() - 0.5);
        document.getElementById('question').innerText = q.join('');
    }

    window.jawab = (idx) => {
        if(idx === correctIdx) b++; else s++;
        document.getElementById('live-b').innerText = b;
        buatSoal();
    };

    function mulaiTimer() {
        let t = 60;
        document.getElementById('timer').innerText = t;
        clearInterval(timerId);
        timerId = setInterval(() => {
            t--; document.getElementById('timer').innerText = t;
            if(t <= 0) {
                clearInterval(timerId);
                stats.push({ col: currentColumn+1, b: b, s: s, t: b+s });
                currentColumn++;
                if(currentColumn < 10) { alert("Lanjut Kolom " + (currentColumn + 1)); jalankanKolom(); }
                else { selesai(); }
            }
        }, 1000);
    }

    function selesai() {
        localStorage.removeItem("rec_col"); localStorage.removeItem("rec_stats");
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-result').classList.add('active');

        const bList = stats.map(d => d.b);
        const totalB = bList.reduce((x, y) => x + y, 0);
        const totalT = stats.reduce((x, y) => x + y.t, 0);

        // Rumus Skor Akustik
        let panker = totalT / 10;
        let tianker = totalT > 0 ? (totalB / totalT) * 100 : 0;
        let janker = Math.max(0, 100 - ((Math.max(...bList) - Math.min(...bList)) * 4));
        let hanker = (bList[7] + bList[8] + bList[9]) / 3 * 2;
        let skorFinal = (Math.min(panker*1.8, 100)*0.3) + (tianker*0.4) + (janker*0.15) + (Math.min(hanker*1.8, 100)*0.15);

        document.getElementById('res-total').innerText = skorFinal.toFixed(1);

        // Kirim Data Skor ke Firebase (Database)
        const user = auth.currentUser;
        if(user) {
            push(ref(db, 'rekap_skor'), {
                email: user.email,
                skor: skorFinal.toFixed(1),
                tanggal: new Date().toLocaleDateString('id-ID'),
                jam: new Date().toLocaleTimeString('id-ID')
            });
        }

        let h = `<table><tr><th>Kolom</th><th>Benar</th><th>Salah</th></tr>`;
        stats.forEach(d => { h += `<tr><td>${d.col}</td><td>${d.b}</td><td>${d.s}</td></tr>`; });
        document.getElementById('res-table').innerHTML = h + `</table>`;

        new Chart(document.getElementById('myChart'), {
            type: 'line',
            data: { labels: stats.map(d => "K"+d.col), datasets: [{ label:'Benar', data: bList, borderColor:'#27ae60' }] },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    window.resetLengkap = () => { localStorage.clear(); location.reload(); };

    window.addEventListener('keydown', (e) => {
        const m = { 'a':0, 'b':1, 'c':2, 'd':3, 'e':4 };
        if(m[e.key.toLowerCase()] !== undefined) window.jawab(m[e.key.toLowerCase()]);
    });
</script>
</body>
</html>
