<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN - CAT KECERMATAN</title>
    <style>
        :root { --primary: #1a252f; --accent: #f39c12; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; border-bottom: 5px solid var(--accent); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #2c3e50; }
        .msg { color: #e74c3c; font-size: 0.8rem; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
<div class="login-box">
    <h2 style="margin-bottom: 20px; color: var(--primary);">MASUK PESERTA</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button id="btn-login">LOGIN</button>
    <div id="message" class="msg"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCT6bL4sZxLEFr_wyxAW7VPRxLukNQ02mw", 
        authDomain: "simulasi-2b93b.firebaseapp.com", 
        databaseURL: "https://simulasi-2b93b-default-rtdb.firebaseio.com", 
        projectId: "simulasi-2b93b", 
        storageBucket: "simulasi-2b93b.firebasestorage.app", 
        appId: "1:562508858666:web:fa63f71ec175c675e64a53" 
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    document.getElementById('btn-login').onclick = async () => {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        const m = document.getElementById('message');
        
        m.innerText = "Mengecek Sesi...";
        try {
            await signInWithEmailAndPassword(auth, e, p);
            window.location.href = "soal.html";
        } catch (err) {
            m.innerText = "Gagal Masuk! Periksa Email/Password.";
        }
    };
</script>
</body>
</html>
