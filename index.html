        body {

        .login-card { 
            background: white;

            width: 100%; 
            max-width: 380px; 
            text-align: center; 
            border-top: 6px solid var(--accent);

        input { 
            width: 100%; 
            padding: 14px; 
            border: 1px solid #ddd; 
            border-radius: 10px; 
            box-sizing: border-box; 
            outline: none; 
            transition: 0.3s;
            font-size: 1rem;
        }

        input:focus { border-color: var(--accent); box-shadow: 0 0 8px rgba(243, 156, 18, 0.2); }

        .btn-login { 
            width: 100%; 
            padding: 15px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 1rem;
            transition: 0.3s; 
            margin-top: 10px;
        }

        .btn-login:hover { background: #2c3e50; transform: translateY(-2px); }
        .btn-login:disabled { background: #bdc3c7; cursor: not-allowed; transform: none; }

        .divider { height: 1px; background: #eee; margin: 30px 0; position: relative; }
        .divider span { 
            position: absolute; 
            top: -10px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: white; 
            padding: 0 15px; 
            color: #95a5a6; 
            font-size: 0.8rem; 
            text-transform: uppercase;
        }

        .btn-wa { 
            display: flex; 
            align-items: center; 
            justify-content: center;
            text-decoration: none; 
            width: 100%; 
            padding: 14px; 
            background: #25D366; 
            color: white; 
            border-radius: 10px; 
            font-weight: bold; 
            box-sizing: border-box; 
            transition: 0.3s;
        }

        .btn-wa:hover { background: #128C7E; }
        
        #error-msg { color: var(--danger); font-size: 0.85rem; margin-top: 15px; display: none; font-weight: 600; }
    </style>
</head>
