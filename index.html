<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login CAT Kecermatan</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 15px; width: 320px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        h2 { color: #2c3e50; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 12px; background: #27ae60; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.3s; }
        button:hover { background: #219150; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>CAT LOGIN</h2>
    <input type="email" id="email" placeholder="Email Peserta">
    <input type="password" id="pass" placeholder="Password">
    <button onclick="prosesLogin()">MASUK KE UJIAN</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCT6bL4sZxLEFr_wyxAW7VPRxLukNQ02mw",
        authDomain: "simulasi-2b93b.firebaseapp.com",
        databaseURL: "https://simulasi-2b93b-default-rtdb.firebaseio.com",
        projectId: "simulasi-2b93b",
        storageBucket: "simulasi-2b93b.firebasestorage.app",
        appId: "1:562508858666:web:fa63f71ec175c675e64a53"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    window.prosesLogin = () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;

        signInWithEmailAndPassword(auth, email, pass)
            .then((userCredential) => {
                const user = userCredential.user;
                const sessionId = Date.now().toString(); // Buat ID Sesi Unik
                
                // Simpan ID Sesi di browser
                localStorage.setItem("sesi_aktif", sessionId);
                
                // Kirim ID Sesi ke Database (Tanda bahwa akun ini sedang aktif)
                set(ref(db, 'active_sessions/' + user.uid), {
                    id_sesi: sessionId,
                    email: user.email,
                    waktu_login: new Date().toLocaleString()
                }).then(() => {
                    window.location.href = "soal.html";
                });
            })
            .catch((error) => {
                alert("Gagal Login! Cek Email/Password atau aktifkan koneksi internet.");
            });
    };
</script>
</body>
</html>
