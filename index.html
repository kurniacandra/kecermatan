<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem CAT - Login</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: #fff; }
        .login-card { background: #16213e; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 380px; text-align: center; border: 1px solid #0f3460; position: relative; }
        .login-card::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 5px; background: #e94560; border-radius: 15px 15px 0 0; }
        h2 { margin-bottom: 10px; color: #e94560; text-transform: uppercase; letter-spacing: 2px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 8px; background: #0f3460; color: #fff; font-size: 16px; outline: none; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #e94560; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; margin-top: 15px; }
        button:hover { background: #950740; transform: translateY(-2px); }
        #error-msg { color: #ff4d4d; font-size: 12px; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Sistem CAT</h2>
    <p style="color:#95a5a6; font-size:13px;">Portal Simulasi Kecermatan Polri</p>
    <input type="email" id="u_email" placeholder="Email Peserta">
    <input type="password" id="u_pass" placeholder="Password">
    <button id="btn_mulai">MULAI UJIAN</button>
    <div id="error-msg"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCT6bL4sZxLEFr_wyxAW7VPRxLukNQ02mw",
        authDomain: "simulasi-2b93b.firebaseapp.com",
        databaseURL: "https://simulasi-2b93b-default-rtdb.firebaseio.com",
        projectId: "simulasi-2b93b",
        storageBucket: "simulasi-2b93b.firebasestorage.app",
        appId: "1:562508858666:web:fa63f71ec175c675e64a53"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    document.getElementById("btn_mulai").onclick = async () => {
        const email = document.getElementById("u_email").value;
        const pass = document.getElementById("u_pass").value;
        const msg = document.getElementById("error-msg");

        try {
            const userCredential = await signInWithEmailAndPassword(auth, email, pass);
            const user = userCredential.user;

            // BUAT SESSION ID UNIK (Misal: jam saat ini)
            const sessionId = Date.now().toString();
            
            // SIMPAN SESI KE DATABASE (Hanya boleh ada 1 sesi per User UID)
            await set(ref(db, 'active_sessions/' + user.uid), {
                id_sesi: sessionId,
                login_at: new Date().toLocaleString()
            });

            // SIMPAN KE LOCALSTORAGE PESERTA
            localStorage.setItem("sesi_saya", sessionId);

            msg.style.color = "#27ae60";
            msg.innerText = "Berhasil! Masuk ke soal...";
            setTimeout(() => { window.location.href = "soal.html"; }, 800);

        } catch (error) {
            msg.innerText = "Akses Ditolak: Akun tidak valid!";
        }
    };
</script>
</body>
</html>
