<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAT KECERMATAN - SIMULASI AKPOL</title>
    <style>
        :root { --primary: #1a73e8; --secondary: #d93025; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { background: white; width: 100%; max-width: 500px; padding: 20px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-top: 20px; }
        .hidden { display: none; }
        
        /* UI Elements */
        input { width: 90%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        button { width: 95%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-secondary { background: #5f6368; margin-top: 10px; }

        /* Tes Area */
        #game-canvas { background: #eee; padding: 20px; border-radius: 10px; margin: 15px 0; font-size: 24px; font-weight: bold; letter-spacing: 5px; }
        
        /* Table Leaderboard */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        th { background: #f1f3f4; color: #5f6368; }
        .rank-gold { color: #f39c12; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-page">
        <h2 style="color: var(--primary)">Pendaftaran Peserta</h2>
        <p>Silakan masuk untuk memulai simulasi 4 aspek.</p>
        <input type="email" id="email" placeholder="Email (Contoh: taruna@tes.com)">
        <input type="password" id="password" placeholder="Password (Min. 6 Karakter)">
        <button onclick="handleLogin()">MASUK / LOGIN</button>
        <button class="btn-secondary" onclick="handleRegister()">DAFTAR AKUN BARU</button>
    </div>

    <div id="ready-page" class="hidden">
        <h3>Persiapan Tes 4 Aspek</h3>
        <p>Halo, <b id="user-name"></b>. Anda akan menghadapi tes kecermatan (angka/huruf hilang).</p>
        <button onclick="mulaiSimulasi()">MULAI TES SEKARANG</button>
    </div>

    <div id="test-page" class="hidden">
        <div id="timer" style="font-size: 20px; color: var(--secondary); font-weight: bold;">Waktu: 60s</div>
        <div id="game-canvas">
            <div id="soal-tampilan">A B C D E</div>
            <div id="pertanyaan" style="margin-top:10px; font-size: 30px; color: var(--primary);">B</div>
        </div>
        <p>Pilih huruf yang tidak ada pada baris atas!</p>
        <button onclick="hitungSkorManual(450)">SELESAI & SIMPAN SKOR</button>
    </div>

    <div id="lead-page" class="hidden">
        <h3>🏆 Peringkat 10 Besar</h3>
        <table>
            <thead><tr><th>Pos</th><th>Nama</th><th>Skor</th></tr></thead>
            <tbody id="isi-leaderboard"></tbody>
        </table>
        <button class="btn-secondary" onclick="location.reload()">COBA LAGI</button>
        <button class="btn-secondary" style="background:#c0392b" onclick="handleLogout()">LOGOUT</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, push, set, onValue, query, orderByChild, limitToLast } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCT6bL4sZxLEFr_wyxAW7VPRxLukNQ02mw",
        authDomain: "simulasi-2b93b.firebaseapp.com",
        databaseURL: "https://simulasi-2b93b-default-rtdb.firebaseio.com",
        projectId: "simulasi-2b93b",
        storageBucket: "simulasi-2b93b.firebasestorage.app",
        messagingSenderId: "562508858666",
        appId: "1:562508858666:web:fa63f71ec175c675e64a53"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // --- MANAJEMEN HALAMAN ---
    function showPage(pageId) {
        document.getElementById('auth-page').classList.add('hidden');
        document.getElementById('ready-page').classList.add('hidden');
        document.getElementById('test-page').classList.add('hidden');
        document.getElementById('lead-page').classList.add('hidden');
        document.getElementById(pageId).classList.remove('hidden');
    }

    // --- LOGIKA AUTH ---
    window.handleRegister = () => {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        createUserWithEmailAndPassword(auth, e, p).catch(err => alert(err.message));
    };

    window.handleLogin = () => {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        signInWithEmailAndPassword(auth, e, p).catch(err => alert("Email/Password Salah"));
    };

    window.handleLogout = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('user-name').innerText = user.email.split('@')[0];
            showPage('ready-page');
            loadLeaderboard();
        } else {
            showPage('auth-page');
        }
    });

    // --- LOGIKA SIMULASI ---
    window.mulaiSimulasi = () => showPage('test-page');

    window.hitungSkorManual = (skorAkhir) => {
        const user = auth.currentUser;
        if (user) {
            const skorRef = ref(db, 'leaderboard');
            set(push(skorRef), {
                nama: user.email.split('@')[0],
                skor: parseInt(skorAkhir),
                waktu: Date.now()
            }).then(() => {
                showPage('lead-page');
            });
        }
    };

    // --- LOAD LEADERBOARD ---
    function loadLeaderboard() {
        const q = query(ref(db, 'leaderboard'), orderByChild('skor'), limitToLast(10));
        onValue(q, (snap) => {
            const list = document.getElementById("isi-leaderboard");
            list.innerHTML = "";
            let arr = [];
            snap.forEach(d => arr.push(d.val()));
            arr.reverse().forEach((d, i) => {
                list.innerHTML += `<tr><td>${i+1}</td><td class="${i==0?'rank-gold':''}">${d.nama}</td><td><b>${d.skor}</b></td></tr>`;
            });
        });
    }
</script>

</body>
</html>
