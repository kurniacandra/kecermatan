<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Masuk Simulasi CAT</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: #fff; }
        .login-card { background: #16213e; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 380px; text-align: center; border: 1px solid #0f3460; }
        h2 { margin-bottom: 10px; color: #e94560; }
        p { font-size: 14px; color: #95a5a6; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 8px; background: #0f3460; color: #fff; font-size: 16px; outline: none; box-sizing: border-box; }
        input:focus { border: 1px solid #e94560; }
        button { width: 100%; padding: 12px; background: #e94560; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; margin-top: 15px; }
        button:hover { background: #950740; transform: translateY(-2px); }
        #error-msg { color: #ff4d4d; font-size: 13px; margin-top: 15px; min-height: 18px; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Sistem CAT</h2>
    <p>Silakan login dengan akun peserta</p>
    
    <input type="text" id="username" placeholder="Username" autocomplete="off">
    <input type="password" id="password" placeholder="Password">
    
    <button onclick="cekLogin()">MULAI UJIAN</button>
    
    <div id="error-msg"></div>
</div>

<script>
    // DAFTAR AKUN PESERTA (Tambahkan di sini)
    // Format: { u: "username", p: "password" }
    const daftarPeserta = [
        { u: "peserta01", p: "akpol2026" },
        { u: "peserta02", p: "semangat26" },
        { u: "admin", p: "rahasia123" }
        { u: "ananta", p: "rahasia123" }
    ];

    function cekLogin() {
        const userIn = document.getElementById("username").value;
        const passIn = document.getElementById("password").value;
        const error = document.getElementById("error-msg");

        // Cari kecocokan data
        const loginBerhasil = daftarPeserta.find(akun => akun.u === userIn && akun.p === passIn);

        if (loginBerhasil) {
            // Membuat token akses sementara agar tidak bisa bypass URL
            sessionStorage.setItem("statusLogin", "aktif");
            sessionStorage.setItem("userAktif", userIn);
            
            // Pindah ke file soal.html
            window.location.href = "soal.html";
        } else {
            error.innerText = "Username atau Password salah!";
        }
    }

    // Fitur tekan Enter untuk login
    document.addEventListener("keypress", function(e) {
        if (e.key === "Enter") { cekLogin(); }
    });
</script>

</body>
</html>
