<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCT6bL4sZxLEFr_wyxAW7VPRxLukNQ02mw", 
        authDomain: "simulasi-2b93b.firebaseapp.com", 
        databaseURL: "https://simulasi-2b93b-default-rtdb.firebaseio.com", 
        projectId: "simulasi-2b93b", 
        storageBucket: "simulasi-2b93b.firebasestorage.app", 
        appId: "1:562508858666:web:fa63f71ec175c675e64a53" 
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const emailInp = document.getElementById('email');
    const passInp = document.getElementById('password');
    const btnLogin = document.getElementById('btn-login');
    const msgArea = document.getElementById('message');

    // Buat ID Sesi unik untuk browser ini (hanya sekali per buka tab)
    if(!sessionStorage.getItem('device_session_id')){
        sessionStorage.setItem('device_session_id', 'dev_' + Math.random().toString(36).substr(2, 9));
    }
    const myId = sessionStorage.getItem('device_session_id');

    onAuthStateChanged(auth, (user) => {
        if (user) {
            const statusRef = ref(db, 'user_sessions/' + user.uid);

            // 1. Daftarkan diri sebagai sesi TERBARU
            set(statusRef, {
                sessionId: myId,
                lastLogin: new Date().toLocaleString('id-ID'),
                email: user.email
            }).then(() => {
                // 2. Pantau perubahan: Jika di masa depan ID ini berubah, baru logout
                onValue(statusRef, (snapshot) => {
                    const data = snapshot.val();
                    if (data && data.sessionId && data.sessionId !== myId) {
                        alert("Sesi berakhir karena login di perangkat lain!");
                        signOut(auth).then(() => { location.reload(); });
                    }
                });
                
                // 3. Pindah ke halaman soal
                window.location.href = "soal.html";
            });
        }
    });

    btnLogin.onclick = async () => {
        msgArea.innerText = "Mengecek kredensial...";
        try {
            // Coba login
            await signInWithEmailAndPassword(auth, emailInp.value, passInp.value);
        } catch (error) {
            msgArea.innerText = "Email atau Password Salah!";
            console.error(error);
        }
    };
</script>
