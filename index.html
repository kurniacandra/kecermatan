<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCT6bL4sZxLEFr_wyxAW7VPRxLukNQ02mw",
        authDomain: "simulasi-2b93b.firebaseapp.com",
        databaseURL: "https://simulasi-2b93b-default-rtdb.firebaseio.com",
        projectId: "simulasi-2b93b",
        storageBucket: "simulasi-2b93b.firebasestorage.app",
        appId: "1:562508858666:web:fa63f71ec175c675e64a53"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    window.login = async () => {
        const email = document.getElementById('email').value.trim();
        const pass = document.getElementById('password').value.trim();
        const btn = document.getElementById('btn-text');

        if(!email || !pass) { 
            alert("Harap isi Email dan Password!"); 
            return; 
        }

        btn.innerText = "MEMVALIDASI...";
        btn.disabled = true;

        try {
            // 1. Proses Login ke Firebase Auth
            const userCredential = await signInWithEmailAndPassword(auth, email, pass);
            const user = userCredential.user;

            // 2. Update Session ID di Realtime Database
            const newSessId = 'sess_' + Math.random().toString(36).substr(2, 9);
            const sRef = ref(db, 'user_sessions/' + user.uid);

            await set(sRef, { 
                sessionId: newSessId,
                lastLogin: Date.now() 
            });

            // 3. Pindah Halaman
            window.location.href = "soal.html";

        } catch (error) {
            console.error(error);
            btn.innerText = "MASUK";
            btn.disabled = false;

            // Handle Error Spesifik
            if (error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found') {
                alert("Email atau Password salah!");
            } else if (error.code === 'auth/network-request-failed') {
                alert("Koneksi internet bermasalah!");
            } else {
                alert("Terjadi kesalahan: " + error.message);
            }
        }
    };
</script>
