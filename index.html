<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCT6bL4sZxLEFr_wyxAW7VPRxLukNQ02mw", 
        authDomain: "simulasi-2b93b.firebaseapp.com", 
        databaseURL: "https://simulasi-2b93b-default-rtdb.firebaseio.com", 
        projectId: "simulasi-2b93b", 
        storageBucket: "simulasi-2b93b.firebasestorage.app", 
        appId: "1:562508858666:web:fa63f71ec175c675e64a53" 
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // ID Sesi unik untuk browser ini
    const myId = 'dev_' + Math.random().toString(36).substr(2, 9);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            const statusRef = ref(db, 'user_sessions/' + user.uid);

            // TENDANG SESI LAMA: Update ID di database dengan ID baru kita
            set(statusRef, { sessionId: myId, email: user.email });

            // PANTAU: Jika nanti ID di database berubah (ada login baru), kita yang mental
            onValue(statusRef, (snapshot) => {
                const data = snapshot.val();
                if (data && data.sessionId !== myId) {
                    alert("Akun login di perangkat lain!");
                    signOut(auth).then(() => { location.reload(); });
                }
            });

            // Langsung pindah ke soal tanpa jeda
            setTimeout(() => { window.location.href = "soal.html"; }, 500);
        }
    });

    document.getElementById('btn-login').onclick = async () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        const msg = document.getElementById('message');
        
        msg.innerText = "Mengecek...";
        try {
            await signInWithEmailAndPassword(auth, email, pass);
        } catch (e) {
            msg.innerText = "Gagal Masuk! Cek Email/Pass.";
        }
    };
</script>
