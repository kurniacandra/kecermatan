<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>MONITORING HASIL - CAT</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #1a252f; --accent: #f39c12; --bg: #f4f7f6; --success: #27ae60; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; flex-wrap: wrap; gap: 20px; border-left: 8px solid var(--primary); }
        .info { flex: 1; min-width: 250px; border-right: 1px solid #eee; }
        .chart-container { flex: 2; min-width: 300px; height: 250px; }
        .skor-besar { font-size: 3rem; font-weight: 850; color: var(--primary); margin: 5px 0; }
        .badge-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .badge { background: #f8f9fa; padding: 5px 10px; border-radius: 6px; font-size: 0.8rem; border: 1px solid #eee; font-weight: bold; }
    </style>
</head>
<body>
    <div style="max-width: 1100px; margin: auto;">
        <h2 style="text-align: center; color: var(--primary);">MONITORING HASIL UJIAN</h2>
        <div id="admin-display">Memuat riwayat peserta...</div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCT6bL4sZxLEFr_wyxAW7VPRxLukNQ02mw", 
        authDomain: "simulasi-2b93b.firebaseapp.com", 
        databaseURL: "https://simulasi-2b93b-default-rtdb.firebaseio.com", 
        projectId: "simulasi-2b93b", 
        appId: "1:562508858666:web:fa63f71ec175c675e64a53" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    onValue(ref(db, 'rekap_skor'), (snap) => {
        const container = document.getElementById('admin-display');
        container.innerHTML = "";
        let dataArray = [];

        snap.forEach(child => { dataArray.push({ id: child.key, ...child.val() }); });
        
        // Membalik urutan agar yang terbaru muncul paling atas (RIWAYAT)
        dataArray.reverse().forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="info">
                    <div style="color: #888; font-size: 0.8rem;">${item.waktu || '---'}</div>
                    <h3 style="margin: 5px 0;">${item.nama ? item.nama.split('@')[0].toUpperCase() : 'USER'}</h3>
                    <div class="skor-besar">${item.skor || 0}</div>
                    <div class="badge-grid">
                        <div class="badge">Kecepatan: ${item.kecepatan || 0}</div>
                        <div class="badge">Ketelitian: ${item.ketelitian || 0}%</div>
                        <div class="badge">Kestabilan: ${item.kestabilan || 0}</div>
                        <div class="badge">Ketahanan: ${item.ketahanan || 0}</div>
                    </div>
                </div>
                <div class="chart-container">
                    <canvas id="canvas-${index}"></canvas>
                </div>
            `;
            container.appendChild(card);

            // Tampilkan grafik jika data pola ada
            if (item.pola_benar) {
                new Chart(document.getElementById(`canvas-${index}`), {
                    type: 'line',
                    data: {
                        labels: ["K1", "K2", "K3", "K4", "K5", "K6", "K7", "K8", "K9", "K10"],
                        datasets: [
                            {
                                label: 'Benar',
                                data: item.pola_benar,
                                borderColor: '#27ae60',
                                backgroundColor: 'rgba(39,174,96,0.1)',
                                borderWidth: 3,
                                tension: 0.4,
                                fill: true
                            },
                            {
                                label: 'Salah',
                                data: item.pola_salah || [],
                                borderColor: '#f39c12',
                                backgroundColor: 'rgba(243,156,18,0.1)',
                                borderWidth: 3,
                                tension: 0.4,
                                fill: true
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: { mode: 'index', intersect: false },
                        scales: { y: { beginAtZero: true } }
                    }
                });
            }
        });
    });
</script>
</body>
</html>
