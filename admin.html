<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>MONITORING HASIL - CAT</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #1a252f; --accent: #f39c12; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; gap: 20px; border-left: 5px solid var(--accent); }
        .info { flex: 1; border-right: 1px solid #eee; padding-right: 15px; }
        .chart-container { flex: 2; height: 200px; min-width: 300px; }
        h3 { margin: 0; color: var(--primary); font-size: 1.2rem; }
        .skor-tag { font-size: 2.5rem; font-weight: 800; color: var(--primary); margin: 10px 0; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 0.85rem; }
        .badge { background: #eee; padding: 4px 8px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>MONITORING REAL-TIME</h2>
        <div id="admin-list">Memuat data peserta...</div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCT6bL4sZxLEFr_wyxAW7VPRxLukNQ02mw", 
        authDomain: "simulasi-2b93b.firebaseapp.com", 
        databaseURL: "https://simulasi-2b93b-default-rtdb.firebaseio.com", 
        projectId: "simulasi-2b93b", 
        storageBucket: "simulasi-2b93b.firebasestorage.app", 
        appId: "1:562508858666:web:fa63f71ec175c675e64a53" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    onValue(ref(db, 'rekap_skor'), (snap) => {
        const list = document.getElementById('admin-list');
        list.innerHTML = "";
        let entries = [];
        
        snap.forEach(child => { entries.push({ id: child.key, ...child.val() }); });
        entries.reverse(); // Terbaru di atas

        entries.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="info">
                    <small style="color:gray">${item.waktu || 'Waktu tidak tercatat'}</small>
                    <h3>${item.nama ? item.nama.split('@')[0].toUpperCase() : 'ANONIM'}</h3>
                    <div class="skor-tag">${item.skor || 0}</div>
                    <div class="stats-grid">
                        <div>Kec: <span class="badge">${item.kecepatan || 0}</span></div>
                        <div>Tel: <span class="badge">${item.ketelitian || 0}%</span></div>
                        <div>Stab: <span class="badge">${item.kestabilan || 0}</span></div>
                        <div>Than: <span class="badge">${item.ketahanan || 0}</span></div>
                    </div>
                </div>
                <div class="chart-container">
                    <canvas id="chart-${index}"></canvas>
                </div>
            `;
            list.appendChild(card);

            if (item.pola) {
                new Chart(document.getElementById(`chart-${index}`), {
                    type: 'line',
                    data: {
                        labels: ["K1", "K2", "K3", "K4", "K5", "K6", "K7", "K8", "K9", "K10"],
                        datasets: [{
                            label: 'Benar',
                            data: item.pola,
                            borderColor: '#27ae60',
                            backgroundColor: 'rgba(39,174,96,0.1)',
                            borderWidth: 3,
                            fill: true,
                            tension: 0.4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: { y: { beginAtZero: true, grid: { display: false } } }
                    }
                });
            }
        });
    });
</script>
</body>
</html>
