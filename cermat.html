<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAT KECERMATAN - FULL FOCUS</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #1a252f; --accent: #f39c12; --success: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; justify-content: center; user-select: none; }
        .container { background: white; width: 100%; max-width: 900px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--primary); color: white; padding: 15px; text-align: center; border-bottom: 5px solid var(--accent); }
        .screen { display: none; padding: 20px; text-align: center; }
        .active { display: block; }
        
        /* PREVIEW GRID */
        .preview-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .preview-card { background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 10px; }
        .img-bundle { display: flex; justify-content: center; gap: 2px; margin-top: 5px; background: #eee; padding: 5px; border-radius: 5px; }
        .img-bundle img { width: 25px; height: 25px; object-fit: contain; }

        /* GAMEPLAY */
        .timer { font-size: 3.5rem; font-weight: 800; color: var(--danger); margin: 10px 0; }
        .key-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 20px; }
        .key-box { border: 2px solid #2c3e50; border-radius: 10px; background: #fff; overflow: hidden; }
        .key-h { background: #2c3e50; color: white; padding: 5px; font-weight: bold; }
        .key-v { padding: 10px; height: 70px; display: flex; justify-content: center; align-items: center; }
        .key-v img { width: 60px; height: 60px; }
        
        #question { display: flex; justify-content: center; gap: 10px; margin: 30px 0; min-height: 100px; }
        #question img { width: 80px; height: 80px; }

        .ans-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; }
        .btn-ans { padding: 25px 0; font-size: 2rem; border: none; background: var(--primary); color: white; border-radius: 12px; cursor: pointer; font-weight: bold; }
        .btn-ans:active { background: var(--accent); }

        .overlay-jeda { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h3>SIMULASI KECERMATAN - MATERI 11</h3></div>

    <div id="screen-setup" class="screen active">
        <h2 style="color:var(--primary)">PILIH MATERI</h2>
        <p>Gambar otomatis dimuat dari server PintarPsi.</p>
        
        <div class="preview-grid" id="preview-area"></div>

        <button onclick="window.mulaiUjian()" style="width:100%; padding:20px; background:var(--success); color:white; border:none; border-radius:12px; font-weight:bold; cursor:pointer; font-size:1.5rem;">MULAI SEKARANG</button>
    </div>

    <div id="screen-game" class="screen">
        <div style="display:flex; justify-content: center; align-items: center; position: relative;">
            <b id="col-label" style="position: absolute; left: 0; font-size: 1.5rem;">KOLOM 1</b>
            <div class="timer" id="timer">60</div>
            </div>
        
        <div class="key-row" id="key-display"></div>
        <div id="question"></div>
        
        <div class="ans-grid">
            <button class="btn-ans" onclick="window.jawab(0)">A</button>
            <button class="btn-ans" onclick="window.jawab(1)">B</button>
            <button class="btn-ans" onclick="window.jawab(2)">C</button>
            <button class="btn-ans" onclick="window.jawab(3)">D</button>
            <button class="btn-ans" onclick="window.jawab(4)">E</button>
        </div>
    </div>

    <div id="screen-result" class="screen">
        <h1>SKOR AKHIR: <span id="final-total">0</span></h1>
        <canvas id="resultChart" style="max-height: 300px;"></canvas>
        <button onclick="location.reload()" style="margin-top:20px; padding:15px 40px; background:var(--primary); color:white; border-radius:10px; cursor:pointer;">ULANGI UJIAN</button>
    </div>
</div>

<div id="jeda-layer" class="overlay-jeda">
    <h1>KOLOM SELESAI</h1>
    <div id="jeda-timer" style="font-size: 5rem; font-weight: 900; color:var(--accent)">3</div>
    <p>Siapkan mata untuk kolom berikutnya!</p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCT6bL4sZxLEFr_wyxAW7VPRxLukNQ02mw", 
        databaseURL: "https://simulasi-2b93b-default-rtdb.firebaseio.com",
        projectId: "simulasi-2b93b", appId: "1:562508858666:web:fa63f71ec175c675e64a53" 
    };
    const db = getDatabase(initializeApp(firebaseConfig));

    const materiData = [];
    for(let k=1; k<=10; k++) {
        let kolom = [];
        ['a','b','c','d','e'].forEach(char => {
            kolom.push(`https://admin.pintarpsi.com/storage/materisebelas.1.kolom${k}.${char}.png`);
        });
        materiData.push(kolom);
    }

    let currentCol = 0, b = 0, s = 0, stats = [], timerId, correctIdx = -1;

    const previewArea = document.getElementById('preview-area');
    materiData.forEach((kolom, i) => {
        let imgs = kolom.map(link => `<img src="${link}">`).join('');
        previewArea.innerHTML += `<div class="preview-card"><b>Kolom ${i+1}</b><div class="img-bundle">${imgs}</div></div>`;
    });

    window.mulaiUjian = () => {
        currentCol = 0; stats = [];
        document.getElementById('screen-setup').style.display = 'none';
        document.getElementById('screen-game').style.display = 'block';
        startStep();
    };

    function startStep() {
        b = 0; s = 0;
        document.getElementById('col-label').innerText = `KOLOM ${currentCol + 1}`;
        let keyHtml = "";
        materiData[currentCol].forEach((link, i) => {
            keyHtml += `<div class="key-box"><div class="key-h">${['A','B','C','D','E'][i]}</div><div class="key-v"><img src="${link}"></div></div>`;
        });
        document.getElementById('key-display').innerHTML = keyHtml;
        newQuest();
        startTimer();
    }

    function newQuest() {
        correctIdx = Math.floor(Math.random() * 5);
        let questImgs = materiData[currentCol].filter((_, i) => i !== correctIdx).sort(() => Math.random() - 0.5);
        document.getElementById('question').innerHTML = questImgs.map(link => `<img src="${link}">`).join('');
    }

    window.jawab = (idx) => {
        if(idx === correctIdx) b++; else s++;
        newQuest();
    };

    function startTimer() {
        let t = 60;
        document.getElementById('timer').innerText = t;
        timerId = setInterval(() => {
            t--;
            document.getElementById('timer').innerText = t;
            if(t <= 0) {
                clearInterval(timerId);
                stats.push({b, s});
                currentCol++;
                if(currentCol < 10) showJeda(); else finish();
            }
        }, 1000);
    }

    function showJeda() {
        const layer = document.getElementById('jeda-layer');
        let sisa = 3;
        layer.style.display = 'flex';
        const jInt = setInterval(() => {
            sisa--;
            document.getElementById('jeda-timer').innerText = sisa;
            if(sisa <= 0) {
                clearInterval(jInt);
                layer.style.display = 'none';
                startStep();
            }
        }, 1000);
    }

    function finish() {
        document.getElementById('screen-game').style.display = 'none';
        document.getElementById('screen-result').style.display = 'block';
        let totalB = stats.reduce((acc, curr) => acc + curr.b, 0);
        document.getElementById('final-total').innerText = (totalB / 10).toFixed(1);

        push(ref(db, 'rekap_skor'), {
            nama: "GUEST_GAMBAR",
            skor: totalB / 10,
            waktu: new Date().toLocaleString(),
            pola_benar: stats.map(d => d.b)
        });

        new Chart(document.getElementById('resultChart'), {
            type: 'line',
            data: {
                labels: stats.map((_, i) => "K"+(i+1)),
                datasets: [{ label: 'Benar', data: stats.map(d => d.b), borderColor: '#27ae60', tension: 0.3, fill:true }]
            }
        });
    }

    window.addEventListener('keydown', (e) => {
        const map = {'a':0,'b':1,'c':2,'d':3,'e':4};
        if(map[e.key.toLowerCase()] !== undefined) window.jawab(map[e.key.toLowerCase()]);
    });
</script>
</body>
</html>
